<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard — Dormic</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f1e;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px;font-size:15px;}
.top-bar{background:#1a1a2e;border-bottom:0.5px solid #2a2a42;height:54px;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:100;}
.back{font-size:22px;color:#e5e7eb;text-decoration:none;}
.top-title{font-size:17px;font-weight:600;color:#fbbf24;display:flex;align-items:center;gap:8px;}
.main{max-width:600px;margin:0 auto;padding:14px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.scard{background:#1a1a2e;border:0.5px solid #2a2a42;border-radius:11px;padding:14px 10px;text-align:center;}
.snum{font-size:22px;font-weight:700;color:#fbbf24;}
.slbl{font-size:11px;color:#9ca3af;margin-top:4px;}
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{flex-shrink:0;padding:9px 16px;background:#1a1a2e;border:0.5px solid #2a2a42;border-radius:20px;font-size:13px;color:#9ca3af;cursor:pointer;font-family:inherit;}
.tab.on{background:linear-gradient(90deg,#6C3BE8,#E8398A);color:#fff;border-color:transparent;}
.panel{background:#1a1a2e;border:0.5px solid #2a2a42;border-radius:13px;padding:6px 0;display:none;}
.panel.on{display:block;}
.row{padding:11px 14px;border-bottom:0.5px solid #232342;}
.row:last-child{border-bottom:none;}
.r-name{font-size:14px;font-weight:600;color:#e5e7eb;}
.r-sub{font-size:12px;color:#9ca3af;margin-top:3px;}
.r-meta{font-size:11px;color:#6b7280;margin-top:4px;}
.msg-card{padding:11px 14px;border-bottom:0.5px solid #232342;}
.mc-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px;}
.mc-anon{font-size:13px;color:#a78bfa;font-weight:600;}
.mc-real{font-size:11px;color:#fbbf24;background:rgba(251,191,36,0.1);padding:3px 7px;border-radius:6px;}
.mc-body{font-size:13px;color:#d1d5db;line-height:1.5;}
.mc-time{font-size:11px;color:#6b7280;margin-top:5px;}
.empty{padding:30px;text-align:center;color:#6b7280;font-size:13px;}
</style>
</head>
<body>
<div class="top-bar">
  <a href="more.html" class="back"><i class="ti ti-arrow-left"></i></a>
  <span class="top-title"><i class="ti ti-shield-lock"></i> Admin Dashboard</span>
</div>

<div class="main" id="content" style="display:none;">
  <div class="stats">
    <div class="scard"><div class="snum" id="stat-users">0</div><div class="slbl">Users</div></div>
    <div class="scard"><div class="snum" id="stat-posts">0</div><div class="slbl">Posts</div></div>
    <div class="scard"><div class="snum" id="stat-ghost">0</div><div class="slbl">Ghost msgs</div></div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('users',this)">Users</button>
    <button class="tab" onclick="switchTab('ghost',this)">Ghost Box</button>
    <button class="tab" onclick="switchTab('alerts',this)">Alerts</button>
    <button class="tab" onclick="switchTab('ratings',this)">Mess Ratings</button>
  </div>

  <div class="panel on" id="panel-users"><div class="empty">Loading...</div></div>
  <div class="panel" id="panel-ghost"><div class="empty">Loading...</div></div>
  <div class="panel" id="panel-alerts"><div class="empty">Loading...</div></div>
  <div class="panel" id="panel-ratings"><div class="empty">Loading...</div></div>
</div>

<div id="not-admin" style="display:none;text-align:center;padding:80px 20px;">
  <i class="ti ti-shield-x" style="font-size:48px;color:#a32d2d;"></i>
  <div style="font-size:16px;margin-top:14px;color:#e5e7eb;">Access denied</div>
  <div style="font-size:13px;margin-top:6px;color:#9ca3af;">Admin login required</div>
  <a href="more.html" style="display:inline-block;margin-top:18px;color:#a78bfa;text-decoration:none;font-size:13px;">← Back</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usersMap = {};
let anonIdMap = {};

window.switchTab = function(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('panel-'+tab).classList.add('on');
};

function timeAgo(d){
  if(!d) return '';
  const sec = Math.floor((Date.now()-d.getTime())/1000);
  if(sec<60) return 'Just now';
  if(sec<3600) return Math.floor(sec/60)+'m ago';
  if(sec<86400) return Math.floor(sec/3600)+'h ago';
  return Math.floor(sec/86400)+'d ago';
}

async function loadAll(){
  const usersSnap = await getDocs(collection(db,'users'));
  document.getElementById('stat-users').textContent = usersSnap.size;
  const usersPanel = document.getElementById('panel-users');
  if(usersSnap.empty){ usersPanel.innerHTML='<div class="empty">No users</div>'; }
  else {
    usersPanel.innerHTML = usersSnap.docs.map(d=>{
      const u = d.data();
      usersMap[d.id] = u;
      return `<div class="row">
        <div class="r-name">${u.name||''} ${u.isDonor?'<span style="color:#a32d2d;font-size:11px;">🩸 donor</span>':''}</div>
        <div class="r-sub">Room ${u.roomNo||''} · ${u.bloodGroup||''} · ${u.degree||''}</div>
        <div class="r-meta">${u.admissionNo||''} · ${u.email||''} · ${u.phone||''}${u.pendingDelete?' · <span style="color:#a32d2d;">⚠ pending delete</span>':''}</div>
      </div>`;
    }).join('');
  }

  const postsSnap = await getDocs(collection(db,'posts'));
  document.getElementById('stat-posts').textContent = postsSnap.size;

  const anonSnap = await getDocs(collection(db,'anonIds'));
  anonSnap.forEach(d=>{ anonIdMap[d.id] = d.data().anonId; });

  const whispersSnap = await getDocs(query(collection(db,'whispers'), orderBy('createdAt','desc')));
  document.getElementById('stat-ghost').textContent = whispersSnap.size;
  const ghostPanel = document.getElementById('panel-ghost');
  if(whispersSnap.empty){ ghostPanel.innerHTML='<div class="empty">No messages yet</div>'; }
  else {
    ghostPanel.innerHTML = whispersSnap.docs.map(d=>{
      const m = d.data();
      const anonId = anonIdMap[m.uid] || 'unknown';
      const realName = usersMap[m.uid]?.name || 'unknown';
      const room = usersMap[m.uid]?.roomNo || '?';
      const time = m.createdAt?.toDate ? timeAgo(m.createdAt.toDate()) : '';
      return `<div class="msg-card">
        <div class="mc-head">
          <span class="mc-anon">${anonId}</span>
          <span class="mc-real">${realName} · Room ${room}</span>
        </div>
        <div class="mc-body">${m.text||''}</div>
        <div class="mc-time">${time}${m.reportCount?' · '+m.reportCount+' reports':''}</div>
      </div>`;
    }).join('');
  }

  try {
    const alertsSnap = await getDocs(query(collection(db,'alerts'), orderBy('createdAt','desc')));
    const alertsPanel = document.getElementById('panel-alerts');
    if(alertsSnap.empty){ alertsPanel.innerHTML='<div class="empty">No alerts</div>'; }
    else {
      alertsPanel.innerHTML = alertsSnap.docs.map(d=>{
        const a = d.data();
        const time = a.createdAt?.toDate ? timeAgo(a.createdAt.toDate()) : '';
        return `<div class="row">
          <div class="r-name">${a.posterName||''} · Room ${a.posterRoom||''}</div>
          <div class="r-sub" style="margin-top:6px;color:#d1d5db;">${a.text||''}</div>
          <div class="r-meta">${time}</div>
        </div>`;
      }).join('');
    }
  } catch(e){
    document.getElementById('panel-alerts').innerHTML = '<div class="empty">No alerts yet</div>';
  }

  try {
    const ratingsSnap = await getDocs(collection(db,'ratings'));
    const ratingsPanel = document.getElementById('panel-ratings');
    if(ratingsSnap.empty){ ratingsPanel.innerHTML='<div class="empty">No ratings</div>'; }
    else {
      const grouped = {};
      ratingsSnap.forEach(d=>{
        const r = d.data();
        const key = `${r.date||'?'} · ${r.meal||'?'}`;
        if(!grouped[key]) grouped[key] = {total:0, count:0};
        grouped[key].total += r.rating || 0;
        grouped[key].count += 1;
      });
      ratingsPanel.innerHTML = Object.entries(grouped)
        .map(([k,v])=>`<div class="row">
          <div class="r-name">${k}</div>
          <div class="r-sub">⭐ ${(v.total/v.count).toFixed(1)} · ${v.count} ratings</div>
        </div>`).join('');
    }
  } catch(e){
    document.getElementById('panel-ratings').innerHTML = '<div class="empty">No ratings yet</div>';
  }
}

onAuthStateChanged(auth, async user => {
  if(!user){ window.location.href='login.html'; return; }
  if(user.email !== 'admin@hostelradar.com'){
    document.getElementById('not-admin').style.display = 'block';
    return;
  }
  document.getElementById('content').style.display = 'block';
  loadAll();
});
</script>
</body>
</html>
