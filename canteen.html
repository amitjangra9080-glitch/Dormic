<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Canteen Tab — Dormic</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Dormic"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px;font-size:16px;overflow-x:hidden;}
.top-bar{background:#fff;border-bottom:0.5px solid #f0f0f0;height:54px;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:100;}
.back{font-size:23px;color:#262626;text-decoration:none;}
.top-title{font-size:17px;font-weight:500;color:#262626;}
.main{width:100%;max-width:500px;margin:0 auto;overflow-x:hidden;}
.desc-note{font-size:14px;color:#8e8e8e;text-align:center;padding:13px 16px 10px;background:#fff;border-bottom:0.5px solid #f0f0f0;font-style:italic;}
.summary{background:#fff;padding:18px 16px;border-bottom:0.5px solid #f0f0f0;display:flex;gap:14px;}
.scard{flex:1;background:#f7f7f7;border-radius:12px;padding:14px;text-align:center;}
.snum{font-size:22px;font-weight:700;color:#B65CE0;}
.slbl{font-size:12px;color:#8e8e8e;margin-top:4px;}
.section-lbl{font-size:13px;color:#B65CE0;padding:14px 16px 8px;text-transform:uppercase;letter-spacing:0.3px;background:#fff;font-weight:600;}
.items-list{background:#fff;padding:4px 0 0;}
.item-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid #f7f7f7;}
.item-row:last-child{border-bottom:none;}
.item-name{flex:1;font-size:15px;color:#262626;}
.item-price{font-size:13px;color:#8e8e8e;min-width:36px;text-align:right;}
.counter{display:flex;align-items:center;gap:10px;}
.cbtn{width:30px;height:30px;border-radius:50%;border:0.5px solid #e0e0e0;background:#f7f7f7;display:flex;align-items:center;justify-content:center;font-size:17px;color:#666;cursor:pointer;font-family:inherit;}
.cbtn:hover{background:#e9e9e9;}
.cnum{font-size:15px;font-weight:600;color:#262626;min-width:20px;text-align:center;}
.custom-section{background:#fff;margin-top:8px;padding:16px;}
.custom-row{display:flex;gap:8px;width:100%;align-items:stretch;}
.custom-row input{flex:1;min-width:0;border:0.5px solid #e5e5e5;border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none;}
.custom-row input:focus{border-color:#B65CE0;}
.custom-row input[type="number"]{flex:0 0 72px;min-width:0;}
.add-btn{flex:0 0 auto;padding:0 14px;height:42px;background:linear-gradient(90deg,#F47B33,#EE4654);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.save-area{padding:16px;background:#fff;margin-top:8px;}
.today-total{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#ede9fe;border-radius:11px;margin-bottom:12px;font-size:15px;font-weight:600;color:#B65CE0;}
.save-btn{width:100%;height:46px;background:linear-gradient(90deg,#F47B33,#EE4654);border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;}
.save-btn:disabled{background:#e0e0e0;color:#aaa;cursor:not-allowed;}
.saved-badge{text-align:center;font-size:13px;color:#3b6d11;padding:10px;background:#eaf3de;border-radius:10px;margin-bottom:10px;display:none;}
.custom-list{margin-top:10px;}
.custom-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f7f7f7;border-radius:9px;margin-bottom:6px;font-size:14px;}
.custom-item .ci-name{flex:1;color:#262626;}
.custom-item .ci-amt{color:#B65CE0;font-weight:600;}
.custom-item .ci-del{color:#a32d2d;background:none;border:none;cursor:pointer;font-size:16px;}

.history-section{background:#fff;margin-top:8px;padding-bottom:8px;}
.history-list{padding:0 16px 8px;}
.history-card{background:#f7f7f7;border-radius:11px;padding:12px 13px;margin-bottom:8px;}
.history-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px;}
.history-date{font-size:14px;font-weight:600;color:#262626;}
.history-total{font-size:14px;font-weight:700;color:#B65CE0;}
.history-items{font-size:13px;color:#666;line-height:1.5;word-break:break-word;}
.history-empty{text-align:center;padding:18px 16px 22px;color:#aaa;font-size:13px;}
@media(max-width:380px){
  .summary{padding:14px 12px;gap:10px;}
  .scard{padding:12px 8px;}
  .custom-section{padding:14px 12px;}
  .custom-row{gap:6px;}
  .custom-row input{padding:10px 10px;font-size:13px;}
  .custom-row input[type="number"]{flex-basis:60px;}
  .add-btn{padding:0 11px;font-size:13px;}
  .item-row{padding:12px;gap:8px;}
  .counter{gap:7px;}
}

.item-row.canteen-item-glow{animation:canteenGlow .48s ease}.cnum.canteen-count-pop{animation:canteenCount .3s ease}.snum.canteen-total-pop{animation:canteenTotal .38s ease}.saved-badge.canteen-receipt{display:block!important;animation:canteenReceipt .52s cubic-bezier(.2,.8,.2,1)}
@keyframes canteenGlow{50%{background:#fff7ed;box-shadow:inset 4px 0 #F47B33}}
@keyframes canteenCount{50%{transform:scale(1.35);color:#E8398A}}
@keyframes canteenTotal{50%{transform:scale(1.1)}}
@keyframes canteenReceipt{from{opacity:0;transform:translateY(-12px) rotate(-1deg)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="top-bar">
  <a href="more.html" class="back"><i class="ti ti-arrow-left"></i></a>
  <span class="top-title">Canteen Tab</span>
</div>

<div class="main">
  <div class="desc-note">Your chai, snacks, and canteen खर्चा — all sorted.</div>

  <div class="summary">
    <div class="scard">
      <div class="snum" id="month-total">₹0</div>
      <div class="slbl">This month</div>
    </div>
    <div class="scard">
      <div class="snum" id="today-total" style="color:#E8398A;">₹0</div>
      <div class="slbl">Today</div>
    </div>
  </div>

  <div class="section-lbl">Add a custom item</div>
  <div class="custom-section">
    <div class="custom-row">
      <input type="text" id="custom-name" placeholder="Item name (e.g. Bun butter)"/>
      <input type="number" id="custom-price" placeholder="₹"/>
      <button class="add-btn" onclick="addCustom()">Add</button>
    </div>
    <div class="custom-list" id="custom-list"></div>
  </div>

  <div class="section-lbl">Tap to add — today's order</div>
  <div class="items-list" id="items-list"></div>

  <div class="save-area">
    <div class="saved-badge" id="saved-badge">Saved today's tab</div>
    <button class="save-btn" id="save-btn" onclick="saveDay()">Save today's tab</button>
  </div>

  <div class="history-section">
    <div class="section-lbl">Previous days</div>
    <div class="history-list" id="history-list"><div class="history-empty">No previous tabs yet</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const items = [
  {name:'Tea (Cutting)', price:10},
  {name:'Tea (Medium)', price:15},
  {name:'Tea (Large)', price:20},
  {name:'Coffee', price:15},
  {name:'Milk', price:33},
  {name:'Samosa', price:15},
  {name:'Pyaz Samosa', price:20},
  {name:'Dahi Samosa', price:25},
  {name:'Aloo Patty', price:15},
  {name:'Aloo Toast', price:15},
  {name:'Maggi', price:30},
  {name:'Sandwich', price:15},
  {name:'Mattar Snack', price:10},
  {name:'Half Fry', price:30},
  {name:'Omelette', price:30},
  {name:'Egg Toast', price:30},
  {name:'Boiled Egg', price:8},
  {name:'Banana Shake', price:30},
  {name:'Mango Shake', price:35},
  {name:'Namkeen', price:10}
];

const today = new Date();
function localDateStr(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const todayStr = localDateStr(today);
const counts = {};
let customItems = [];
let currentUser = null;

items.forEach((_,i)=>counts[i]=0);

function renderItems(){
  document.getElementById('items-list').innerHTML = items.map((item,i)=>`
    <div class="item-row" id="canteen-row-${i}">
      <span class="item-name">${item.name}</span>
      <span class="item-price">₹${item.price}</span>
      <div class="counter">
        <button class="cbtn" onclick="dec(${i})">−</button>
        <span class="cnum" id="c-${i}">${counts[i]}</span>
        <button class="cbtn" onclick="inc(${i})">+</button>
      </div>
    </div>
  `).join('');
  updateTodayTotal();
}

function renderCustom(){
  const list = document.getElementById('custom-list');
  if(!customItems.length){ list.innerHTML = ''; return; }
  list.innerHTML = customItems.map((c,i)=>`
    <div class="custom-item">
      <span class="ci-name">${c.name}</span>
      <span class="ci-amt">₹${c.price}</span>
      <button class="ci-del" onclick="removeCustom(${i})"><i class="ti ti-x"></i></button>
    </div>
  `).join('');
  updateTodayTotal();
}

window.inc = i => { counts[i]++; document.getElementById(`c-${i}`).textContent=counts[i]; updateTodayTotal(); };
window.dec = i => { if(counts[i]>0){counts[i]--; document.getElementById(`c-${i}`).textContent=counts[i]; updateTodayTotal();} };

window.addCustom = function(){
  const name = document.getElementById('custom-name').value.trim();
  const price = parseInt(document.getElementById('custom-price').value);
  if(!name || !price || price<=0){ alert('Enter both name and price'); return; }
  customItems.push({name, price});
  document.getElementById('custom-name').value='';
  document.getElementById('custom-price').value='';
  renderCustom();
};

window.removeCustom = function(i){
  customItems.splice(i,1);
  renderCustom();
};

function animateCanteenItem(i,num){const row=document.getElementById(`canteen-row-${i}`);[row,num].forEach(el=>{if(!el)return;const c=el===row?'canteen-item-glow':'canteen-count-pop';el.classList.remove(c);void el.offsetWidth;el.classList.add(c);setTimeout(()=>el.classList.remove(c),520);});}
function pulseCanteenTotals(){['today-total','month-total'].forEach(id=>{const el=document.getElementById(id);el.classList.remove('canteen-total-pop');void el.offsetWidth;el.classList.add('canteen-total-pop');setTimeout(()=>el.classList.remove('canteen-total-pop'),430);});}
function updateTodayTotal(animate=false){
  let total = 0;
  items.forEach((item,i)=> total += item.price * counts[i]);
  customItems.forEach(c=> total += c.price);
  document.getElementById('today-total').textContent = '₹'+total;
}

window.saveDay = async function(){
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const itemsToSave = items
      .map((item,i)=>({name:item.name, price:item.price, qty:counts[i], subtotal: item.price*counts[i]}))
      .filter(it=>it.qty>0);
    const total = items.reduce((s,item,i)=>s+item.price*counts[i],0) + customItems.reduce((s,c)=>s+c.price,0);
    await setDoc(doc(db,'canteenTab',currentUser.uid,'days',todayStr),{
      date: todayStr,
      items: itemsToSave,
      customItems: customItems,
      total,
      savedAt: new Date()
    });
    const badge=document.getElementById('saved-badge');badge.style.display='block';badge.classList.remove('canteen-receipt');void badge.offsetWidth;badge.classList.add('canteen-receipt');softCanteenSound();navigator.vibrate?.(30);
    btn.textContent = 'Saved!';
    setTimeout(()=>{ btn.textContent='Save today\'s tab'; btn.disabled=false; document.getElementById('saved-badge').style.display='none';document.getElementById('saved-badge').classList.remove('canteen-receipt'); }, 2000);
    await loadCanteenSummary();
  } catch(e){
    btn.disabled = false; btn.textContent = 'Save today\'s tab';
    alert('Error: '+e.message);
  }
};

async function loadCanteenSummary(){
  const history = document.getElementById('history-list');
  try {
    const snap = await getDocs(collection(db,'canteenTab',currentUser.uid,'days'));
    const allDays = snap.docs.map(d=>d.data()).filter(d=>d.date);
    const monthPrefix = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
    const monthTotal = allDays
      .filter(d=>String(d.date).startsWith(monthPrefix))
      .reduce((sum,d)=>sum+(Number(d.total)||0),0);
    document.getElementById('month-total').textContent = '₹'+monthTotal;

    const previous = allDays
      .filter(d=>d.date < todayStr)
      .sort((a,b)=>String(b.date).localeCompare(String(a.date)));

    if(!previous.length){
      history.innerHTML = '<div class="history-empty">No previous tabs yet</div>';
      return;
    }

    history.innerHTML = previous.map(day=>{
      const dateObj = new Date(day.date+'T00:00:00');
      const dateLabel = dateObj.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
      const regular = (day.items||[]).map(i=>`${i.name} ×${i.qty}`);
      const custom = (day.customItems||[]).map(i=>i.name);
      const itemText = [...regular,...custom].join(' · ') || 'No items recorded';
      return `<div class="history-card">
        <div class="history-head">
          <span class="history-date">${dateLabel}</span>
          <span class="history-total">₹${Number(day.total)||0}</span>
        </div>
        <div class="history-items">${itemText}</div>
      </div>`;
    }).join('');
  } catch(e){
    document.getElementById('month-total').textContent = '₹0';
    history.innerHTML = '<div class="history-empty">Could not load previous tabs</div>';
  }
}

async function loadTodayData(){
  try {
    const snap = await getDoc(doc(db,'canteenTab',currentUser.uid,'days',todayStr));
    if(snap.exists()){
      const d = snap.data();
      (d.items||[]).forEach(saved=>{
        const idx = items.findIndex(it=>it.name===saved.name);
        if(idx>=0) counts[idx] = saved.qty;
      });
      customItems = d.customItems || [];
      renderItems();
      renderCustom();
    }
  } catch(e){}
}

function softCanteenSound(){try{const C=window.AudioContext||window.webkitAudioContext,c=new C(),o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.setValueAtTime(680,c.currentTime);o.frequency.exponentialRampToValueAtTime(1040,c.currentTime+.09);g.gain.setValueAtTime(.035,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.16);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.16)}catch(e){}}

onAuthStateChanged(auth, async user => {
  if(!user){ window.location.href='login.html'; return; }
  currentUser = user;
  renderItems();
  renderCustom();
  await loadTodayData();
  await loadCanteenSummary();
});
</script>
</body>
</html>
