<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Canteen Tab — Dormic</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon.png"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Dormic"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px;font-size:16px;overflow-x:hidden}.top{height:54px;background:#fff;border-bottom:.5px solid #eee;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:20}.back{font-size:23px;color:#262626;text-decoration:none}.title{font-size:17px;font-weight:500}.main{width:100%;max-width:500px;margin:auto;overflow:hidden}.desc{padding:13px 16px 10px;background:#fff;text-align:center;color:#8e8e8e;font-size:14px;font-style:italic}.summary{display:flex;gap:14px;padding:18px 16px;background:#fff}.scard{flex:1;min-width:0;background:#f7f7f7;border-radius:12px;padding:14px 8px;text-align:center}.snum{font-size:22px;font-weight:700;color:#B65CE0}.slbl{font-size:12px;color:#8e8e8e;margin-top:4px}.label{font-size:13px;color:#B65CE0;padding:14px 16px 8px;text-transform:uppercase;letter-spacing:.3px;background:#fff;font-weight:600}.custom{background:#fff;padding:14px 16px}.custom-row{display:flex;gap:8px;width:100%}.custom-row input{min-width:0;flex:1;border:.5px solid #ddd;border-radius:10px;padding:11px 12px;font-size:16px;font-family:inherit;outline:none}.custom-row input[type=number]{flex:0 1 78px}.add{height:42px;padding:0 14px;border:0;border-radius:10px;background:linear-gradient(90deg,#F47B33,#EE4654);color:#fff;font-weight:600}.custom-list{margin-top:10px}.custom-item{display:flex;align-items:center;gap:9px;padding:8px 11px;background:#f7f7f7;border-radius:9px;margin-bottom:6px;font-size:14px}.ci-name{flex:1}.ci-price{color:#B65CE0;font-weight:600}.remove{border:0;background:none;color:#a32d2d;font-size:17px}.items{background:#fff}.item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:.5px solid #f4f4f4}.iname{flex:1;min-width:0;font-size:15px}.price{font-size:13px;color:#8e8e8e}.counter{display:flex;align-items:center;gap:8px}.cbtn{width:30px;height:30px;border-radius:50%;border:.5px solid #ddd;background:#f7f7f7;font-size:17px}.cnum{min-width:20px;text-align:center;font-weight:600}.save-area{background:#fff;padding:16px;margin-top:8px}.save{width:100%;height:46px;border:0;border-radius:11px;background:linear-gradient(90deg,#F47B33,#EE4654);color:#fff;font-size:16px;font-weight:600}.save:disabled{background:#ddd}.badge{display:none;text-align:center;padding:10px;background:#eaf3de;color:#3b6d11;border-radius:10px;margin-bottom:10px;font-size:13px}.history{background:#fff;margin-top:8px;padding-bottom:8px}.history-list{padding:0 16px}.hcard{background:#f7f7f7;border-radius:11px;padding:12px 13px;margin-bottom:8px}.hhead{display:flex;justify-content:space-between;margin-bottom:7px}.hdate{font-size:14px;font-weight:600}.htotal{font-size:14px;color:#B65CE0;font-weight:700}.hitems{font-size:13px;color:#666;line-height:1.5}.hempty{text-align:center;padding:20px;color:#aaa;font-size:13px}.item.glow{animation:glow .45s}.cnum.pop{animation:pop .28s}.snum.pop{animation:pop .35s}.badge.receipt{display:block;animation:receipt .5s}@keyframes glow{50%{background:#fff7ed;box-shadow:inset 3px 0 #F47B33}}@keyframes pop{50%{transform:scale(1.22)}}@keyframes receipt{from{opacity:0;transform:translateY(-10px) rotate(-1deg)}to{opacity:1;transform:none}}@media(max-width:380px){.summary{padding:14px 12px;gap:10px}.custom{padding:14px 12px}.custom-row{gap:6px}.add{padding:0 10px}.item{padding:12px;gap:7px}}
</style></head><body><div class="top"><a href="more.html" class="back"><i class="ti ti-arrow-left"></i></a><span class="title">Canteen Tab</span></div><div class="main"><div class="desc">Your chai, snacks, and canteen खर्चा — all sorted.</div><div class="summary"><div class="scard"><div class="snum" id="monthTotal">₹0</div><div class="slbl">This month</div></div><div class="scard"><div class="snum" id="todayTotal" style="color:#E8398A">₹0</div><div class="slbl">Today</div></div></div><div class="label">Add a custom item</div><div class="custom"><div class="custom-row"><input id="customName" placeholder="Item name"><input id="customPrice" type="number" min="1" placeholder="₹"><button class="add" onclick="addCustom()">Add</button></div><div class="custom-list" id="customList"></div></div><div class="label">Tap to add — today’s order</div><div class="items" id="items"></div><div class="save-area"><div class="badge" id="badge">Today’s tab saved</div><button class="save" id="saveBtn" onclick="saveDay()">Save today’s tab</button></div><div class="history"><div class="label">Previous days</div><div class="history-list" id="history"><div class="hempty">No previous tabs yet</div></div></div></div><script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,doc,getDoc,setDoc,collection,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";import{firebaseConfig}from"./firebase-config.js";const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);const menu=[['Tea (Cutting)',10],['Tea (Medium)',15],['Tea (Large)',20],['Coffee',15],['Milk',33],['Samosa',15],['Pyaz Samosa',20],['Dahi Samosa',25],['Aloo Patty',15],['Aloo Toast',15],['Maggi',30],['Sandwich',15],['Mattar Snack',10],['Half Fry',30],['Omelette',30],['Egg Toast',30],['Boiled Egg',8],['Banana Shake',30],['Mango Shake',35],['Namkeen',10]].map(([name,price])=>({name,price}));const now=new Date(),todayKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;let user,counts={},custom=[],savedDays=[];menu.forEach((_,i)=>counts[i]=0);const draftKey=()=>user?`dormic_canteen_${user.uid}_${todayKey}`:'';function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function renderItems(){items.innerHTML=menu.map((x,i)=>`<div class="item"><span class="iname">${x.name}</span><span class="price">₹${x.price}</span><div class="counter"><button class="cbtn" onclick="dec(${i})">−</button><span class="cnum" id="c${i}">${counts[i]||0}</span><button class="cbtn" onclick="inc(${i})">+</button></div></div>`).join('')}function renderCustom(){customList.innerHTML=custom.map((x,i)=>`<div class="custom-item"><span class="ci-name">${esc(x.name)}</span><span class="ci-price">₹${x.price}</span><button class="remove" onclick="removeCustom(${i})"><i class="ti ti-x"></i></button></div>`).join('')}function currentTotal(){return menu.reduce((s,x,i)=>s+x.price*(counts[i]||0),0)+custom.reduce((s,x)=>s+Number(x.price||0),0)}function monthSavedTotal(){return savedDays.filter(x=>x.date?.slice(0,7)===todayKey.slice(0,7)&&x.date!==todayKey).reduce((s,x)=>s+Number(x.total||0),0)}function updateTotals(animate=false){todayTotal.textContent='₹'+currentTotal();monthTotal.textContent='₹'+(monthSavedTotal()+currentTotal());if(animate){todayTotal.classList.add('pop');monthTotal.classList.add('pop');setTimeout(()=>{todayTotal.classList.remove('pop');monthTotal.classList.remove('pop')},360)}}function persistDraft(){if(!user)return;localStorage.setItem(draftKey(),JSON.stringify({counts,custom}))}function loadDraft(){try{const d=JSON.parse(localStorage.getItem(draftKey())||'null');if(d){counts={...counts,...d.counts};custom=Array.isArray(d.custom)?d.custom:[]}}catch(e){}}window.inc=i=>{counts[i]=(counts[i]||0)+1;const n=document.getElementById('c'+i),r=n.closest('.item');n.textContent=counts[i];n.classList.add('pop');r.classList.add('glow');setTimeout(()=>{n.classList.remove('pop');r.classList.remove('glow')},450);persistDraft();updateTotals(true)};window.dec=i=>{if((counts[i]||0)>0){counts[i]--;document.getElementById('c'+i).textContent=counts[i];persistDraft();updateTotals(true)}};window.addCustom=()=>{const name=customName.value.trim(),price=Number(customPrice.value);if(!name||price<=0)return alert('Enter item name and price');custom.push({name,price});customName.value='';customPrice.value='';renderCustom();persistDraft();updateTotals(true)};window.removeCustom=i=>{custom.splice(i,1);renderCustom();persistDraft();updateTotals(true)};function sound(){try{const C=window.AudioContext||window.webkitAudioContext,c=new C(),o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.setValueAtTime(700,c.currentTime);o.frequency.exponentialRampToValueAtTime(1050,c.currentTime+.08);g.gain.setValueAtTime(.035,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.14);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.14)}catch(e){}}window.saveDay=async()=>{saveBtn.disabled=true;saveBtn.textContent='Saving...';try{const chosen=menu.map((x,i)=>({...x,qty:counts[i]||0,subtotal:x.price*(counts[i]||0)})).filter(x=>x.qty>0),total=currentTotal();await setDoc(doc(db,'canteenTab',user.uid,'days',todayKey),{date:todayKey,items:chosen,customItems:custom,total,savedAt:new Date()});localStorage.removeItem(draftKey());badge.style.display='block';badge.classList.add('receipt');saveBtn.textContent='Saved!';sound();navigator.vibrate?.(30);await loadAllDays();setTimeout(()=>{badge.style.display='none';badge.classList.remove('receipt');saveBtn.disabled=false;saveBtn.textContent='Save today’s tab'},1800)}catch(e){saveBtn.disabled=false;saveBtn.textContent='Save today’s tab';alert('Error: '+e.message)}};async function loadToday(){const s=await getDoc(doc(db,'canteenTab',user.uid,'days',todayKey));if(s.exists()){const d=s.data();(d.items||[]).forEach(x=>{const i=menu.findIndex(m=>m.name===x.name);if(i>=0)counts[i]=Number(x.qty)||0});custom=(d.customItems||[]).map(x=>({name:String(x.name||''),price:Number(x.price)||0})).filter(x=>x.name&&x.price>0)}else loadDraft();renderItems();renderCustom();updateTotals()}async function loadAllDays(){const s=await getDocs(collection(db,'canteenTab',user.uid,'days'));savedDays=s.docs.map(d=>d.data()).sort((a,b)=>String(b.date).localeCompare(String(a.date)));renderHistory();updateTotals()}function renderHistory(){const previous=savedDays.filter(x=>x.date!==todayKey);if(!previous.length){history.innerHTML='<div class="hempty">No previous tabs yet</div>';return}history.innerHTML=previous.map(d=>{const date=new Date(d.date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}),regular=(d.items||[]).map(x=>`${esc(x.name)} ×${x.qty}`),cust=(d.customItems||[]).map(x=>`${esc(x.name)} (₹${x.price})`),text=[...regular,...cust].join(', ')||'No items';return`<div class="hcard"><div class="hhead"><span class="hdate">${date}</span><span class="htotal">₹${Number(d.total)||0}</span></div><div class="hitems">${text}</div></div>`}).join('')}onAuthStateChanged(auth,async u=>{if(!u){location.href='login.html';return}user=u;renderItems();try{await loadAllDays();await loadToday()}catch(e){loadDraft();renderItems();renderCustom();updateTotals()}});
</script></body></html>
