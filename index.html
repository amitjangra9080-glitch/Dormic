<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dormic — Ajanta Hostel No. 3</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:70px;}
.top-bar{background:#fff;border-bottom:0.5px solid #f0f0f0;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:22px;font-weight:700;background:linear-gradient(90deg,#6C3BE8,#E8398A,#F97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.3px;}
.logo-sub{font-size:10px;color:#aaa;font-weight:400;display:block;margin-top:-2px;-webkit-text-fill-color:#aaa;}
.pills-wrap{background:#fff;border-bottom:0.5px solid #f0f0f0;padding:10px 14px;overflow-x:auto;display:flex;gap:7px;}
.pills-wrap::-webkit-scrollbar{display:none;}
.pill{font-size:12px;padding:6px 14px;border-radius:20px;background:#f7f7f7;border:0.5px solid #e8e8e8;color:#666;white-space:nowrap;cursor:pointer;transition:all 0.15s;}
.pill.on{background:linear-gradient(90deg,#6C3BE8,#E8398A);color:#fff;border:none;}
.feed{max-width:600px;margin:0 auto;}
.gap{height:8px;}
.card{background:#fff;}
.card-head{display:flex;align-items:center;gap:10px;padding:12px 14px 9px;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-shrink:0;}
.av-grad-1{background:linear-gradient(135deg,#6C3BE8,#E8398A);}
.av-grad-2{background:linear-gradient(135deg,#E8398A,#F97316);}
.av-grad-3{background:linear-gradient(135deg,#6C3BE8,#F97316);}
.av-grad-4{background:linear-gradient(135deg,#4c9c5e,#6C3BE8);}
.uname{font-size:13px;font-weight:500;color:#262626;line-height:1.2;}
.uloc{font-size:11px;color:#8e8e8e;}
.badge{margin-left:auto;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.b-lost{background:#fee2e2;color:#a32d2d;}
.b-found{background:#eaf3de;color:#3b6d11;}
.b-have{background:#ede9fe;color:#5b21b6;}
.b-need{background:#fce7f3;color:#9d174d;}
.b-sell{background:#fef3c7;color:#92400e;}
.b-buy{background:#e0f2fe;color:#0369a1;}
.b-going{background:#fff3e0;color:#b45309;}
.b-need-travel{background:#f0fdf4;color:#166534;}
.b-resolved{background:#f3f4f6;color:#6b7280;border:0.5px solid #e5e7eb;}
.card-body{padding:0 14px 6px;}
.cat-line{font-size:11px;color:#8e8e8e;display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.item-name{font-size:15px;font-weight:500;color:#262626;line-height:1.3;margin-bottom:3px;}
.item-desc{font-size:13px;color:#555;line-height:1.5;}
.route-box{display:flex;align-items:center;gap:8px;margin:7px 0;padding:10px 12px;background:#f7f7f7;border-radius:10px;}
.city{font-size:14px;font-weight:500;color:#262626;}
.r-date{font-size:11px;color:#8e8e8e;margin-left:auto;display:flex;align-items:center;gap:3px;}
.card-actions{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 4px;border-top:0.5px solid #f7f7f7;margin-top:6px;}
.status-btn{font-size:12px;font-weight:500;color:#6C3BE8;border:0.5px solid #c4b5fd;border-radius:20px;padding:5px 13px;background:#ede9fe;cursor:pointer;transition:all 0.15s;}
.status-btn:active{transform:scale(0.97);}
.wa-btn{font-size:13px;font-weight:500;color:#25D366;display:flex;align-items:center;gap:5px;text-decoration:none;}
.time-line{padding:3px 14px 10px;font-size:10px;color:#bbb;letter-spacing:0.2px;}
.empty-state{text-align:center;padding:48px 24px;}
.empty-img{width:200px;opacity:0.7;margin-bottom:16px;}
.empty-title{font-size:16px;font-weight:500;color:#262626;margin-bottom:6px;}
.empty-sub{font-size:13px;color:#8e8e8e;}
.loading{text-align:center;padding:40px;color:#aaa;font-size:14px;}
.active-label{font-size:11px;color:#aaa;padding:8px 14px 4px;text-transform:uppercase;letter-spacing:0.3px;}
.resolved-section{opacity:0.55;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #f0f0f0;display:flex;align-items:center;justify-content:space-around;height:60px;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#ccc;font-size:22px;}
.nav-item span{font-size:10px;color:#ccc;}
.nav-item.on{color:#6C3BE8;}
.nav-item.on span{color:#6C3BE8;}
.nav-fab{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#6C3BE8,#E8398A);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;text-decoration:none;}
.notify-bar{background:#fff;border-bottom:0.5px solid #f0f0f0;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:600px;margin:0 auto;}
.notify-txt{font-size:12px;color:#555;}
.notify-btn{font-size:12px;font-weight:600;background:linear-gradient(90deg,#6C3BE8,#E8398A);color:#fff;border:none;border-radius:20px;padding:5px 14px;cursor:pointer;}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <span class="logo">Dormic<span class="logo-sub">Ajanta Hostel No. 3</span></span>
  </div>
</div>

<div style="max-width:600px;margin:0 auto;">
  <div class="notify-bar" id="notify-bar" style="display:none;">
    <span class="notify-txt">Get notified when someone posts a lost or found item</span>
    <button class="notify-btn" onclick="requestNotify()">Allow</button>
  </div>
</div>

<div class="pills-wrap">
  <span class="pill on" data-filter="all">All</span>
  <span class="pill" data-filter="lost-found">Lost/Found</span>
  <span class="pill" data-filter="have-need">Have/Need</span>
  <span class="pill" data-filter="sell-buy">Sell/Buy</span>
  <span class="pill" data-filter="travel">Travel</span>
</div>

<div class="feed" id="feed">
  <div class="loading">Loading posts...</div>
</div>

<nav class="nav-bar">
  <a href="index.html" class="nav-item on">
    <i class="ti ti-home"></i>
    <span>Home</span>
  </a>
  <a href="search.html" class="nav-item">
    <i class="ti ti-search"></i>
    <span>Search</span>
  </a>
  <a href="post.html" class="nav-fab" id="post-fab" style="display:none;">
    <i class="ti ti-plus"></i>
  </a>
  <a href="login.html" class="nav-fab" id="login-fab">
    <i class="ti ti-plus"></i>
  </a>
  <a href="more.html" class="nav-item">
    <i class="ti ti-layout-grid"></i>
    <span>More</span>
  </a>
  <a href="profile.html" class="nav-item" id="nav-profile" style="display:none;">
    <i class="ti ti-user"></i>
    <span>Profile</span>
  </a>
  <a href="login.html" class="nav-item" id="nav-login">
    <i class="ti ti-user"></i>
    <span>Login</span>
  </a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allPosts = [];
let currentFilter = 'all';

// Auth state
onAuthStateChanged(auth, user => {
  if(user) {
    currentUser = user;
    document.getElementById('post-fab').style.display = 'flex';
    document.getElementById('login-fab').style.display = 'none';
    document.getElementById('nav-profile').style.display = 'flex';
    document.getElementById('nav-login').style.display = 'none';
    document.getElementById('notify-bar').style.display = 'flex';
  } else {
    window.location.href = 'login.html';
  }
});

// Load posts
const q = query(collection(db,'posts'), orderBy('createdAt','desc'));
onSnapshot(q, snap => {
  allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
  renderFeed();
});

// Pills
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
    pill.classList.add('on');
    currentFilter = pill.dataset.filter;
    renderFeed();
  });
});

function renderFeed() {
  const feed = document.getElementById('feed');
  let posts = allPosts;

  if(currentFilter === 'lost-found') posts = posts.filter(p => ['lost','found'].includes(p.type));
  else if(currentFilter === 'have-need') posts = posts.filter(p => ['have','need'].includes(p.type));
  else if(currentFilter === 'sell-buy') posts = posts.filter(p => ['sell','buy'].includes(p.type));
  else if(currentFilter === 'travel') posts = posts.filter(p => p.type === 'travel');

  const active = posts.filter(p => p.status !== 'resolved');
  const resolved = posts.filter(p => p.status === 'resolved');

  if(posts.length === 0) {
    feed.innerHTML = `
      <div class="empty-state">
        <img src="ajanta-illustration.png" class="empty-img" alt="Ajanta Hostel No. 3"/>
        <div class="empty-title">No posts yet</div>
        <div class="empty-sub">Be the first to post something</div>
      </div>`;
    return;
  }

  let html = '';
  if(active.length > 0) {
    active.forEach(p => { html += buildCard(p, false); });
  }
  if(resolved.length > 0) {
    html += `<div class="active-label resolved-section" style="margin-top:8px;">Resolved</div>`;
    resolved.forEach(p => { html += buildCard(p, true); });
  }
  feed.innerHTML = html;
}

function buildCard(p, isResolved) {
  const time = p.createdAt ? timeAgo(p.createdAt.seconds * 1000) : 'Just now';
  const initials = (p.posterName || '?')[0].toUpperCase();
  const gradients = ['av-grad-1','av-grad-2','av-grad-3','av-grad-4'];
  const grad = gradients[initials.charCodeAt(0) % 4];
  const waLink = `https://wa.me/91${p.posterPhone}?text=Hi%20${encodeURIComponent(p.posterName)}%2C%20I%20saw%20your%20post%20on%20Dormic%20about%20${encodeURIComponent(p.itemName || 'your post')}`;
  const isOwner = currentUser && currentUser.uid === p.posterUid;

  let statusBtn = '';
  if(isOwner && !isResolved) {
    const labels = {found:'Mark as claimed', sell:'Mark as sold', have:'Mark as available', travel:'Mark as full'};
    const label = labels[p.type];
    if(label) statusBtn = `<button class="status-btn" onclick="resolvePost('${p.id}')">  ${label}</button>`;
  } else if(isResolved) {
    const doneLabels = {found:'Claimed',sell:'Sold',have:'Done',travel:'Full',lost:'Resolved'};
    statusBtn = `<span style="font-size:12px;color:#9ca3af;display:flex;align-items:center;gap:4px;"><i class="ti ti-check"></i> ${doneLabels[p.type] || 'Resolved'}</span>`;
  }

  // Travel card
  if(p.type === 'travel') {
    return `
    <div class="gap"></div>
    <div class="card ${isResolved ? 'resolved-section' : ''}">
      <div class="card-head">
        <div class="av ${grad}">${initials}</div>
        <div><div class="uname">${p.posterName || 'Unknown'}</div><div class="uloc">Room ${p.posterRoom || ''}</div></div>
        <span class="badge b-${p.travelType === 'going' ? 'going' : 'need-travel'}">${p.travelType === 'going' ? 'Going' : 'Need'}</span>
      </div>
      <div class="card-body">
        <div class="route-box">
          <span class="city">${p.from || ''}</span>
          <i class="ti ti-arrow-right" style="color:#aaa;font-size:16px;"></i>
          <span class="city">${p.to || ''}</span>
          <span class="r-date"><i class="ti ti-calendar" style="font-size:13px;"></i> ${p.travelDate || ''}</span>
        </div>
        ${p.itemDesc ? `<div class="item-desc">${p.itemDesc}</div>` : ''}
      </div>
      <div class="card-actions">
        ${statusBtn || '<span></span>'}
        <a href="${waLink}" target="_blank" class="wa-btn"><i class="ti ti-brand-whatsapp"></i> Message</a>
      </div>
      <div class="time-line">${time}</div>
    </div>`;
  }

  // Standard card
  const catIcons = {lost:'ti-search-off',found:'ti-search',have:'ti-package',need:'ti-package-import',sell:'ti-tag',buy:'ti-shopping-cart'};
  const icon = catIcons[p.type] || 'ti-circle';
  return `
  <div class="gap"></div>
  <div class="card ${isResolved ? 'resolved-section' : ''}">
    <div class="card-head">
      <div class="av ${grad}">${initials}</div>
      <div><div class="uname">${p.posterName || 'Unknown'}</div><div class="uloc">${p.location || ''}</div></div>
      <span class="badge b-${p.type}">${p.type.charAt(0).toUpperCase()+p.type.slice(1)}</span>
      ${isResolved ? `<span class="badge b-resolved" style="margin-left:4px;"><i class="ti ti-check"></i></span>` : ''}
    </div>
    <div class="card-body">
      <div class="cat-line"><i class="ti ${icon}"></i> ${p.itemType || ''}</div>
      <div class="item-name">${p.itemName || ''}</div>
      <div class="item-desc">${p.description || ''}</div>
      ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%;border-radius:10px;margin-top:8px;max-height:200px;object-fit:cover;"/>` : ''}
    </div>
    <div class="card-actions">
      ${statusBtn || '<span></span>'}
      <a href="${waLink}" target="_blank" class="wa-btn"><i class="ti ti-brand-whatsapp"></i> Message</a>
    </div>
    <div class="time-line">${time}</div>
  </div>`;
}

window.resolvePost = async function(id) {
  await updateDoc(doc(db, 'posts', id), {status: 'resolved'});
};

window.requestNotify = function() {
  if('Notification' in window) {
    Notification.requestPermission().then(p => {
      if(p === 'granted') document.getElementById('notify-bar').style.display = 'none';
    });
  }
};

function timeAgo(ms) {
  const diff = Date.now() - ms;
  const m = Math.floor(diff/60000);
  if(m < 1) return 'Just now';
  if(m < 60) return `${m} min ago`;
  const h = Math.floor(m/60);
  if(h < 24) return `${h} hour${h>1?'s':''} ago`;
  const d = Math.floor(h/24);
  if(d < 7) return `${d} day${d>1?'s':''} ago`;
  return new Date(ms).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
</script>
</body>
</html>
