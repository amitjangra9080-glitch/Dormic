<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mess Menu — Dormic</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Dormic"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px;font-size:16px;}
.top-bar{background:#fff;border-bottom:0.5px solid #f0f0f0;height:54px;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:100;}
.back{font-size:23px;color:#262626;text-decoration:none;}
.top-title{font-size:17px;font-weight:500;color:#262626;}
.main{max-width:500px;margin:0 auto;}
.days-row{display:flex;gap:8px;padding:13px 14px;overflow-x:auto;background:#fff;border-bottom:0.5px solid #f0f0f0;}
.days-row::-webkit-scrollbar{display:none;}
.day{font-size:13px;padding:7px 14px;border-radius:20px;background:#f7f7f7;border:0.5px solid #e8e8e8;color:#666;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.day.on{background:linear-gradient(90deg,#F47B33,#EE4654);color:#fff;border:none;}
.meals-wrap{padding:4px 14px 0;background:#fff;}
.meal{padding:15px 0;border-bottom:0.5px solid #f7f7f7;}
.meal:last-child{border-bottom:none;}
.meal-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.meal-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;}
.meal-name{font-size:15px;font-weight:500;color:#262626;}
.meal-time{font-size:13px;color:#aaa;margin-left:auto;}
.meal-items{font-size:15px;color:#555;line-height:1.55;padding-left:42px;}
.stars{display:flex;gap:5px;padding-left:42px;margin-top:10px;}
.star{font-size:26px;color:#e0e0e0;cursor:pointer;transition:color 0.1s;}
.star.on{color:#F97316;}
.complaint-box{margin:10px 0 0 42px;display:flex;flex-direction:column;gap:8px;}
.c-select{width:100%;border:0.5px solid #e5e5e5;border-radius:10px;background:#f9f9f9;font-size:14px;color:#262626;padding:11px 13px;outline:none;font-family:inherit;}
.c-text{width:100%;border:0.5px solid #e5e5e5;border-radius:10px;background:#f9f9f9;font-size:14px;color:#262626;padding:11px 13px;outline:none;font-family:inherit;resize:none;}
.submit-rating-btn{margin:12px 0 4px 42px;width:calc(100% - 42px);height:44px;background:linear-gradient(90deg,#F47B33,#EE4654);border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.submit-rating-btn:disabled{background:#e0e0e0;color:#aaa;cursor:not-allowed;}
.submitted-badge{display:flex;align-items:center;gap:6px;font-size:14px;color:#3b6d11;background:#eaf3de;padding:10px 14px 10px 42px;margin-top:8px;border-radius:8px;}
.anon-note{font-size:13px;color:#aaa;text-align:center;padding:14px 16px;border-top:0.5px solid #f0f0f0;background:#fff;font-style:italic;}

.discard-modal{position:fixed;inset:0;background:rgba(17,24,39,.48);z-index:13000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}.discard-modal.show{display:flex}.discard-card{width:min(360px,100%);background:#fff;border-radius:20px;padding:24px 20px 18px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.22);animation:discardPop .22s ease}.discard-icon{width:54px;height:54px;border-radius:17px;margin:0 auto 13px;display:grid;place-items:center;font-size:27px;color:#fff;background:linear-gradient(135deg,#F47B33,#EE4654,#B65CE0,#6B7BFA)}.discard-title{font-size:19px;font-weight:800;color:#202124;margin-bottom:7px}.discard-copy{font-size:14px;line-height:1.5;color:#74747d;margin-bottom:19px}.discard-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.discard-keep,.discard-leave{height:44px;border-radius:12px;font:600 14px inherit;cursor:pointer}.discard-keep{background:#fff;border:1px solid #dedee5;color:#333}.discard-leave{border:0;color:#fff;background:linear-gradient(90deg,#EE4654,#B65CE0)}@keyframes discardPop{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:none}}

</style>
</head>
<body>
<div class="top-bar">
  <a href="more.html" class="back"><i class="ti ti-arrow-left"></i></a>
  <span class="top-title">Mess Menu</span>
</div>
<div class="main">
  <div class="days-row" id="days-row"></div>
  <div class="meals-wrap" id="meals-content"></div>
  <div class="anon-note">Rate freely — your name stays undercover. Only the ratings reach the Mess President.</div>
</div>


<div class="discard-modal" id="discard-modal"><div class="discard-card"><div class="discard-icon"><i class="ti ti-alert-triangle"></i></div><div class="discard-title">Discard changes?</div><div class="discard-copy">Your unsaved changes will be lost.</div><div class="discard-actions"><button class="discard-keep" id="discard-keep" type="button">Keep editing</button><button class="discard-leave" id="discard-leave" type="button">Discard</button></div></div></div>
<script>
(function(){let dirty=false,pending=null,bypass=false;const modal=document.getElementById('discard-modal');history.replaceState({dormicBase:true},'',location.href);history.pushState({dormicGuard:true},'',location.href);
function show(x){pending=x;modal.classList.add('show')}function hide(){modal.classList.remove('show');pending=null}function setDirty(v=true){dirty=!!v}function markSaved(){dirty=false}
document.addEventListener('input',e=>{if(e.target.matches('input,textarea,select'))dirty=true},true);document.addEventListener('change',e=>{if(e.target.matches('input,textarea,select'))dirty=true},true);document.addEventListener('click',e=>{if(e.target.closest('.group-chip,.sub-chip,.star,.photo-box,.cbtn,.tp,.ta,.check,.chip.editable,.pick,.done-btn,.circle-btn,.type,.mini-check,.day-pick'))dirty=true},true);
document.addEventListener('click',e=>{const a=e.target.closest('a[href]');if(!a||!dirty||e.defaultPrevented||a.target==='_blank')return;const h=a.getAttribute('href');if(!h||h.startsWith('#')||h.startsWith('javascript:'))return;e.preventDefault();e.stopImmediatePropagation();show({type:'link',href:a.href})},true);
window.addEventListener('popstate',()=>{if(bypass){bypass=false;return}if(dirty)show({type:'history'});else{bypass=true;history.back()}});window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue=''}});
document.getElementById('discard-keep').onclick=()=>{const hist=pending?.type==='history';hide();if(hist)history.pushState({dormicGuard:true},'',location.href)};document.getElementById('discard-leave').onclick=()=>{const x=pending;dirty=false;hide();if(x?.type==='link'){window.DormicNavigate?window.DormicNavigate(x.href):location.href=x.href}else if(x?.type==='history'){bypass=true;history.back()}};modal.onclick=e=>{if(e.target===modal)document.getElementById('discard-keep').click()};window.DormicUnsaved={markDirty:()=>dirty=true,markSaved,setDirty,isDirty:()=>dirty};})();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, user => { if(!user) window.location.href='login.html'; });

const menu = {
  Mon:{B:['Potato Sabzi','Parathas','Chai','Milk','Curd','Pickle'],L:['Classic Rajma','Rice','Chapatis','Curd','Raita','Buttermilk','Chutney','Salad'],D:['Mixed Vegetable','Dal','Rice','Chapatis','Chutney','Salad','Milk']},
  Tue:{B:['Poha','Chai','Milk','Curd','Pickle'],L:['Potato & Peas','Fried Rice','Chapatis','Curd','Raita','Buttermilk','Chutney','Salad'],D:['Dal Makhani','Custard','Rice','Chapatis','Chutney','Salad']},
  Wed:{B:['Potato-Onion Stuffed Parathas','Chai','Milk','Curd','Pickle'],L:['Kabuli Chickpeas','Rice','Chapatis','Curd','Raita','Buttermilk','Chutney','Salad'],D:['Paneer','Rice','Chapatis','Chutney','Salad','Milk']},
  Thu:{B:['Paneer Stuffed Parathas','Chai','Milk','Curd','Pickle'],L:['Kadhi Pakora','Rice','Chapatis','Curd','Raita','Buttermilk','Chutney','Salad'],D:['Seasonal Vegetable','Dal','Rice','Chapatis','Chutney','Salad','Milk']},
  Fri:{B:['Desi Chickpeas','Parathas','Chai','Milk','Curd','Pickle'],L:['Dal','Fried Rice','Chapatis','Curd','Raita','Buttermilk','Chutney','Salad'],D:['Sev Bhaji','Rice','Chapatis','Chutney','Salad','Milk']},
  Sat:{B:['Potato-Onion Parathas','Chai','Milk','Curd','Pickle'],L:['Desi Chickpeas with Potato','Rice','Chapatis','Curd','Raita','Buttermilk','Chutney','Salad'],D:['Dal','Rice','Chapatis','Chutney','Salad','Milk']},
  Sun:{B:['Chole Kulche / Pav Bhaji','Chai','Milk','Shake'],L:['Chole Puri','Rice','Chapatis','Curd','Raita','Buttermilk','Chutney','Salad'],D:['Seasonal Vegetable','Dal','Rice','Chapatis','Chutney','Salad','Milk']}
};

const menuDisplay = {
  Mon:{B:'Potato Sabzi with Parathas',L:'Classic Rajma with Rice',D:'Mixed Vegetable with Dal'},
  Tue:{B:'Light & Savoury Poha',L:'Potato & Peas with Fried Rice',D:'Dal Makhani with Custard'},
  Wed:{B:'Potato-Onion Stuffed Parathas',L:'Kabuli Chickpeas',D:'Paneer'},
  Thu:{B:'Paneer Stuffed Parathas',L:'Kadhi Pakora',D:'Seasonal Vegetable with Dal'},
  Fri:{B:'Desi Chickpeas with Parathas',L:'Dal with Fried Rice',D:'Sev Bhaji'},
  Sat:{B:'Potato-Onion Parathas',L:'Desi Chickpeas with Potato',D:'Dal'},
  Sun:{B:'Chole Kulche / Pav Bhaji',L:'Chole Puri',D:'Seasonal Vegetable with Dal'}
};

const dayKeys = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const today = new Date();
const todayKey = dayKeys[today.getDay()===0?6:today.getDay()-1];
const todayStr = today.toISOString().split('T')[0];
let activeDay = todayKey;
const ratings = {b:0,l:0,d:0};
const submitted = {b:false,l:false,d:false};

const mealData = [
  {key:'B',name:'Breakfast',time:'8:00 – 9:00 AM',color:'linear-gradient(135deg,#F59E0B,#EF4444)',icon:'ti-coffee',rk:'b'},
  {key:'L',name:'Lunch',time:'1:00 – 2:00 PM',color:'linear-gradient(135deg,#14B8A6,#84CC16)',icon:'ti-tools-kitchen-2',rk:'l'},
  {key:'D',name:'Dinner',time:'8:00 – 9:00 PM',color:'linear-gradient(135deg,#6366F1,#A855F7)',icon:'ti-moon',rk:'d'}
];

// Build day pills
const daysRow = document.getElementById('days-row');
dayKeys.forEach(d => {
  const el = document.createElement('span');
  el.className = 'day'+(d===activeDay?' on':'');
  el.textContent = d;
  el.onclick = () => {
    activeDay = d;
    renderMenu();
    document.querySelectorAll('.day').forEach(x => x.classList.remove('on'));
    el.classList.add('on');
  };
  daysRow.appendChild(el);
});

function renderMenu(){
  const isToday = activeDay === todayKey;
  document.getElementById('meals-content').innerHTML = mealData.map(meal => {
    const items = menu[activeDay][meal.key];
    const displayText = menuDisplay[activeDay][meal.key];
    const itemOptions = items.map(i => `<option value="${i}">${i}</option>`).join('');
    return `
    <div class="meal">
      <div class="meal-head">
        <span class="meal-ic" style="background:${meal.color};"><i class="ti ${meal.icon}"></i></span>
        <span class="meal-name">${meal.name}</span>
        <span class="meal-time">${meal.time}</span>
      </div>
      <div class="meal-items">${displayText}</div>
      ${isToday && !submitted[meal.rk] ? `
        <div class="stars" id="stars-${meal.rk}">
          ${[1,2,3,4,5].map(n=>`<span class="star" onclick="rate('${meal.rk}',${n})">★</span>`).join('')}
        </div>
        <div class="complaint-box" id="complaint-${meal.rk}" style="display:none;">
          <select class="c-select" id="item-${meal.rk}">
            <option value="">Which item had an issue? (optional)</option>
            ${itemOptions}
          </select>
          <select class="c-select" id="issue-${meal.rk}">
            <option value="">What was wrong? (optional)</option>
            <option>Quantity was less</option>
            <option>Quality was poor</option>
            <option>Was cold / not fresh</option>
            <option>Item was missing from menu</option>
            <option>Other</option>
          </select>
          <textarea class="c-text" id="note-${meal.rk}" placeholder="Any other feedback... (optional)" rows="2"></textarea>
          <button class="submit-rating-btn" id="submit-rating-${meal.rk}" onclick="submitRating('${meal.rk}')">Submit</button>
        </div>
      ` : isToday && submitted[meal.rk] ? `
        <div class="submitted-badge"><i class="ti ti-check"></i> Feedback submitted — thank you</div>
      ` : ''}
    </div>`;
  }).join('');
}

window.rate = function(meal, n){
  if(submitted[meal]) return;
  ratings[meal] = n;
  document.querySelectorAll(`#stars-${meal} .star`).forEach((s,i) => s.classList.toggle('on', i<n));
  const cb = document.getElementById(`complaint-${meal}`);
  cb.style.display = 'flex';
  cb.style.flexDirection = 'column';
  cb.style.gap = '8px';
};

window.submitRating = async function(meal){
  if(submitted[meal]) return;
  const n = ratings[meal];
  if(n===0){alert('Please select a star rating first.');return;}
  const item = document.getElementById(`item-${meal}`)?.value||'';
  const issue = document.getElementById(`issue-${meal}`)?.value||'';
  const note = document.getElementById(`note-${meal}`)?.value||'';
  const btn = document.getElementById(`submit-rating-${meal}`);
  btn.disabled=true; btn.textContent='Submitting...';
  try {
    await addDoc(collection(db,'ratings'),{
      meal, date:todayStr, day:activeDay,
      rating:n, item, issue, note,
      hostel:'Ajanta Hostel No. 3',
      createdAt:serverTimestamp()
    });
    submitted[meal] = true;
    window.DormicUnsaved?.markSaved();
    renderMenu();
  } catch(e){
    btn.disabled=false; btn.textContent='Submit';
    alert('Error: '+e.message);
  }
};

renderMenu();
</script>
</body>
</html>
