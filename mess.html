<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mess — Dormic</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Dormic"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px;font-size:16px;}
.top-bar{background:#fff;border-bottom:0.5px solid #f0f0f0;height:54px;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:100;}
.back{font-size:23px;color:#262626;text-decoration:none;}
.top-title{font-size:17px;font-weight:500;color:#262626;}
.seg{display:flex;border-bottom:0.5px solid #f0f0f0;background:#fff;}
.sg{flex:1;text-align:center;padding:13px 0;font-size:15px;font-weight:500;color:#aaa;border-bottom:2.5px solid transparent;cursor:pointer;}
.sg.on{color:#6C3BE8;border-bottom-color:#6C3BE8;}
.main{max-width:500px;margin:0 auto;}
/* MENU */
.days-row{display:flex;gap:8px;padding:13px 14px;overflow-x:auto;background:#fff;border-bottom:0.5px solid #f0f0f0;}
.days-row::-webkit-scrollbar{display:none;}
.day{font-size:13px;padding:7px 14px;border-radius:20px;background:#f7f7f7;border:0.5px solid #e8e8e8;color:#666;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.day.on{background:linear-gradient(90deg,#6C3BE8,#E8398A);color:#fff;border:none;}
.meals-wrap{padding:4px 14px 16px;background:#fff;}
.meal{padding:15px 0;border-bottom:0.5px solid #f7f7f7;}
.meal:last-child{border-bottom:none;}
.meal-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.meal-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;}
.meal-name{font-size:15px;font-weight:500;color:#262626;}
.meal-time{font-size:13px;color:#aaa;margin-left:auto;}
.meal-items{font-size:15px;color:#555;line-height:1.55;padding-left:42px;}
.stars{display:flex;gap:5px;padding-left:42px;margin-top:8px;}
.star{font-size:22px;color:#e0e0e0;cursor:pointer;}
.star.on{color:#F97316;}
/* TRACKER */
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;background:#fff;}
.cal-month{font-size:16px;font-weight:500;color:#262626;}
.cal-strip{display:flex;gap:6px;padding:4px 12px 12px;overflow-x:auto;background:#fff;border-bottom:0.5px solid #f0f0f0;}
.cal-strip::-webkit-scrollbar{display:none;}
.cday{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;width:30px;}
.cday-lbl{font-size:11px;color:#aaa;font-weight:500;}
.cdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:#f7f7f7;color:#ccc;border:0.5px solid #eee;}
.cdot.full{background:#eaf3de;color:#3b6d11;border:none;}
.cdot.part{background:#fce7f3;color:#9d174d;border:none;}
.cdot.miss{background:#fee2e2;color:#a32d2d;border:none;}
.cdot.today{outline:2.5px solid #6C3BE8;outline-offset:1px;}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px;background:#fff;border-bottom:0.5px solid #f0f0f0;}
.scard{background:#f7f7f7;border-radius:11px;padding:10px 4px;text-align:center;}
.snum{font-size:17px;font-weight:600;}
.slbl{font-size:11px;color:#aaa;margin-top:2px;}
.today-lbl{font-size:13px;color:#6C3BE8;padding:13px 14px 9px;text-transform:uppercase;letter-spacing:0.3px;background:#fff;font-weight:600;}
.tracker-meals{padding:0 0 8px;background:#fff;}
.tmeal{display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:12px;padding:14px 14px;border-bottom:0.5px solid #f7f7f7;}
.tmeal:last-child{border-bottom:none;}
.tmic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;}
.tmeal-name{font-size:15px;font-weight:500;color:#262626;}
.tmeal-time{font-size:13px;color:#aaa;}
.tright{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.tog{display:flex;border:0.5px solid #e0e0e0;border-radius:20px;overflow:hidden;}
.tp,.ta{font-size:13px;padding:7px 14px;cursor:pointer;color:#aaa;background:#fff;}
.tp.on{background:#eaf3de;color:#3b6d11;font-weight:600;}
.ta.on{background:#fee2e2;color:#a32d2d;font-weight:600;}
.grow{display:flex;align-items:center;gap:8px;}
.glbl{font-size:13px;color:#aaa;}
.cbtn{width:26px;height:26px;border-radius:50%;border:0.5px solid #e0e0e0;background:#f7f7f7;display:flex;align-items:center;justify-content:center;font-size:16px;color:#aaa;cursor:pointer;}
.cnum{font-size:14px;font-weight:600;color:#262626;min-width:18px;text-align:center;}
.submit-area{padding:14px;background:#fff;margin-top:8px;}
.submit-btn{width:100%;height:46px;background:linear-gradient(90deg,#6C3BE8,#E8398A);border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;}
.edit-btn-row{width:100%;height:42px;background:#f7f7f7;border:0.5px solid #e0e0e0;border-radius:11px;color:#6C3BE8;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:10px;}
.saved-badge{text-align:center;font-size:13px;color:#3b6d11;padding:10px;background:#eaf3de;border-radius:10px;margin-bottom:10px;display:none;}
.disabled-tog{opacity:0.5;pointer-events:none;}
</style>
</head>
<body>
<div class="top-bar">
  <a href="more.html" class="back"><i class="ti ti-arrow-left"></i></a>
  <span class="top-title">Mess</span>
</div>
<div class="seg">
  <div class="sg on" id="sg0" onclick="showTab(0)">Menu</div>
  <div class="sg" id="sg1" onclick="showTab(1)">My Tracker</div>
</div>

<!-- MENU TAB -->
<div id="tab-menu" class="main">
  <div class="days-row" id="days-row"></div>
  <div class="meals-wrap" id="meals-content"></div>
</div>

<!-- TRACKER TAB -->
<div id="tab-tracker" class="main" style="display:none;">
  <div class="cal-head">
    <span class="cal-month" id="cal-month"></span>
  </div>
  <div class="cal-strip" id="cal-strip"></div>
  <div class="summary">
    <div class="scard"><div class="snum" style="color:#3b6d11;" id="s-meals">0</div><div class="slbl">Meals</div></div>
    <div class="scard"><div class="snum" style="color:#a32d2d;" id="s-absent">0</div><div class="slbl">Absent</div></div>
    <div class="scard"><div class="snum" style="color:#9d174d;" id="s-guests">0</div><div class="slbl">Guests</div></div>
    <div class="scard"><div class="snum" style="color:#6C3BE8;" id="s-month">Jun</div><div class="slbl">Month</div></div>
  </div>
  <div class="today-lbl" id="today-date-lbl">Today</div>
  <div class="tracker-meals" id="tracker-meals-wrap">
    <div class="tmeal">
      <span class="tmic" style="background:#e8a445;"><i class="ti ti-coffee"></i></span>
      <div><div class="tmeal-name">Breakfast</div><div class="tmeal-time">8:00 – 9:00 AM</div></div>
      <div class="tright">
        <div class="tog" id="tog-b"><span class="tp" id="bp" onclick="setP('b')">Present</span><span class="ta" id="ba" onclick="setA('b')">Absent</span></div>
        <div class="grow"><span class="glbl">Guest</span><span class="cbtn" onclick="dc('bg')">−</span><span class="cnum" id="bg">0</span><span class="cbtn" onclick="ic('bg')">+</span></div>
      </div>
    </div>
    <div class="tmeal">
      <span class="tmic" style="background:#4c9c5e;"><i class="ti ti-tools-kitchen-2"></i></span>
      <div><div class="tmeal-name">Lunch</div><div class="tmeal-time">1:00 – 2:00 PM</div></div>
      <div class="tright">
        <div class="tog" id="tog-l"><span class="tp" id="lp" onclick="setP('l')">Present</span><span class="ta" id="la" onclick="setA('l')">Absent</span></div>
        <div class="grow"><span class="glbl">Guest</span><span class="cbtn" onclick="dc('lg')">−</span><span class="cnum" id="lg">0</span><span class="cbtn" onclick="ic('lg')">+</span></div>
      </div>
    </div>
    <div class="tmeal">
      <span class="tmic" style="background:#6C3BE8;"><i class="ti ti-moon"></i></span>
      <div><div class="tmeal-name">Dinner</div><div class="tmeal-time">8:00 – 9:00 PM</div></div>
      <div class="tright">
        <div class="tog" id="tog-d"><span class="tp" id="dp" onclick="setP('d')">Present</span><span class="ta" id="da" onclick="setA('d')">Absent</span></div>
        <div class="grow"><span class="glbl">Guest</span><span class="cbtn" onclick="dc('dg')">−</span><span class="cnum" id="dg">0</span><span class="cbtn" onclick="ic('dg')">+</span></div>
      </div>
    </div>
  </div>
  <div class="submit-area">
    <div class="saved-badge" id="saved-badge">Saved for today</div>
    <button class="submit-btn" id="submit-btn" onclick="submitTracker()">Save today's meals</button>
    <button class="edit-btn-row" id="edit-btn" onclick="editTracker()" style="display:none;">Edit today's entry</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const menu = {
  Mon:{B:'Potato Sabzi with Parathas',L:'Classic Rajma with Rice',D:'Mixed Vegetable with Dal'},
  Tue:{B:'Light & Savoury Poha',L:'Potato & Peas with Fried Rice',D:'Dal Makhani with Custard'},
  Wed:{B:'Potato-Onion Stuffed Parathas',L:'Kabuli Chickpeas',D:'Paneer'},
  Thu:{B:'Paneer Stuffed Parathas',L:'Kadhi Pakora',D:'Seasonal Vegetable with Dal'},
  Fri:{B:'Desi Chickpeas with Parathas',L:'Dal with Fried Rice',D:'Sev Bhaji'},
  Sat:{B:'Potato-Onion Parathas',L:'Desi Chickpeas with Potato',D:'Dal'},
  Sun:{B:'Chole Kulche / Pav Bhaji',L:'Chole Puri',D:'Seasonal Vegetable with Dal'}
};
const dayKeys = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const today = new Date();
const todayKey = dayKeys[today.getDay()===0?6:today.getDay()-1];
let activeDay = todayKey;
let currentUser = null;
let isLocked = false;
const counts = {bg:0,lg:0,dg:0};
const state = {b:null,l:null,d:null};

// Format today's date as key e.g. "2026-06-10"
const todayStr = today.toISOString().split('T')[0];
const monthName = today.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
document.getElementById('cal-month').textContent = monthName;
document.getElementById('s-month').textContent = today.toLocaleDateString('en-IN',{month:'short'});

// Set today label
document.getElementById('today-date-lbl').textContent = `Today — ${today.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'})}`;

onAuthStateChanged(auth, async user => {
  if(!user){window.location.href='login.html';return;}
  currentUser = user;
  await loadTodayData();
  buildCalendar();
});

async function loadTodayData(){
  try {
    const snap = await getDoc(doc(db,'messTracker',currentUser.uid,'days',todayStr));
    if(snap.exists()){
      const d = snap.data();
      // Restore state
      state.b = d.breakfast||null;
      state.l = d.lunch||null;
      state.d = d.dinner||null;
      counts.bg = d.breakfastGuests||0;
      counts.lg = d.lunchGuests||0;
      counts.dg = d.dinnerGuests||0;
      // Update UI
      updateToggleUI('b',state.b);
      updateToggleUI('l',state.l);
      updateToggleUI('d',state.d);
      document.getElementById('bg').textContent = counts.bg;
      document.getElementById('lg').textContent = counts.lg;
      document.getElementById('dg').textContent = counts.dg;
      // Lock the form — already saved
      lockForm();
    }
  } catch(e){console.log('No data yet for today');}
}

function updateToggleUI(meal, val){
  const p = document.getElementById(meal+'p');
  const a = document.getElementById(meal+'a');
  if(val==='present'){p.className='tp on';a.className='ta';}
  else if(val==='absent'){a.className='ta on';p.className='tp';}
  else{p.className='tp';a.className='ta';}
}

function lockForm(){
  isLocked = true;
  document.getElementById('tog-b').classList.add('disabled-tog');
  document.getElementById('tog-l').classList.add('disabled-tog');
  document.getElementById('tog-d').classList.add('disabled-tog');
  document.querySelectorAll('.cbtn').forEach(b=>b.style.pointerEvents='none');
  document.getElementById('submit-btn').style.display='none';
  document.getElementById('edit-btn').style.display='block';
  document.getElementById('saved-badge').style.display='block';
}

function unlockForm(){
  isLocked = false;
  document.getElementById('tog-b').classList.remove('disabled-tog');
  document.getElementById('tog-l').classList.remove('disabled-tog');
  document.getElementById('tog-d').classList.remove('disabled-tog');
  document.querySelectorAll('.cbtn').forEach(b=>b.style.pointerEvents='');
  document.getElementById('submit-btn').style.display='block';
  document.getElementById('edit-btn').style.display='none';
  document.getElementById('saved-badge').style.display='none';
}

window.setP = m => { if(isLocked)return; state[m]='present'; updateToggleUI(m,'present'); };
window.setA = m => { if(isLocked)return; state[m]='absent'; updateToggleUI(m,'absent'); };
window.ic = id => { if(isLocked)return; counts[id]++; document.getElementById(id).textContent=counts[id]; };
window.dc = id => { if(isLocked)return; if(counts[id]>0){counts[id]--; document.getElementById(id).textContent=counts[id];} };

window.submitTracker = async function(){
  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='Saving...';
  try {
    await setDoc(doc(db,'messTracker',currentUser.uid,'days',todayStr),{
      date: todayStr,
      breakfast: state.b||'not set',
      lunch: state.l||'not set',
      dinner: state.d||'not set',
      breakfastGuests: counts.bg,
      lunchGuests: counts.lg,
      dinnerGuests: counts.dg,
      savedAt: new Date()
    });
    lockForm();
    updateSummary();
  } catch(e){
    btn.disabled=false; btn.textContent='Save today\'s meals';
    alert('Error saving: '+e.message);
  }
};

window.editTracker = function(){
  unlockForm();
};

function updateSummary(){
  const meals = [state.b,state.l,state.d].filter(s=>s==='present').length;
  const absent = [state.b,state.l,state.d].filter(s=>s==='absent').length;
  const guests = counts.bg+counts.lg+counts.dg;
  document.getElementById('s-meals').textContent=meals;
  document.getElementById('s-absent').textContent=absent;
  document.getElementById('s-guests').textContent=guests;
}

async function buildCalendar(){
  const strip = document.getElementById('cal-strip');
  const daysInMonth = new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  strip.innerHTML='';
  for(let i=1;i<=daysInMonth;i++){
    const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const isToday = i===today.getDate();
    const isPast = i<today.getDate();
    const div = document.createElement('div');
    div.className='cday';
    const lbl = document.createElement('span');
    lbl.className='cday-lbl';
    lbl.textContent=i;
    const dot = document.createElement('span');
    dot.className='cdot'+(isToday?' today':'');
    // Only load data for past days and today
    if(isPast||isToday){
      try {
        const snap = await getDoc(doc(db,'messTracker',currentUser.uid,'days',dateStr));
        if(snap.exists()){
          const d=snap.data();
          const presentCount=[d.breakfast,d.lunch,d.dinner].filter(v=>v==='present').length;
          if(presentCount===3)dot.classList.add('full');
          else if(presentCount>0)dot.classList.add('part');
          else dot.classList.add('miss');
          dot.textContent=presentCount;
        }
      }catch(e){}
    }
    div.appendChild(lbl);
    div.appendChild(dot);
    strip.appendChild(div);
  }
}

// MENU
const daysRow = document.getElementById('days-row');
dayKeys.forEach(d=>{
  const el=document.createElement('span');
  el.className='day'+(d===activeDay?' on':'');
  el.textContent=d;
  el.onclick=()=>{activeDay=d;renderMenu();document.querySelectorAll('.day').forEach(x=>x.classList.remove('on'));el.classList.add('on');};
  daysRow.appendChild(el);
});

const mealData=[
  {key:'B',name:'Breakfast',time:'8:00 – 9:00 AM',color:'#e8a445',icon:'ti-coffee',rk:'b'},
  {key:'L',name:'Lunch',time:'1:00 – 2:00 PM',color:'#4c9c5e',icon:'ti-tools-kitchen-2',rk:'l'},
  {key:'D',name:'Dinner',time:'8:00 – 9:00 PM',color:'#6C3BE8',icon:'ti-moon',rk:'d'}
];
const ratings={b:0,l:0,d:0};

function renderMenu(){
  const m=menu[activeDay];
  document.getElementById('meals-content').innerHTML=mealData.map(meal=>`
    <div class="meal">
      <div class="meal-head">
        <span class="meal-ic" style="background:${meal.color};"><i class="ti ${meal.icon}"></i></span>
        <span class="meal-name">${meal.name}</span>
        <span class="meal-time">${meal.time}</span>
      </div>
      <div class="meal-items">${m[meal.key]}</div>
      ${activeDay===todayKey?`<div class="stars" id="stars-${meal.rk}">${[1,2,3,4,5].map(n=>`<span class="star${ratings[meal.rk]>=n?' on':''}" onclick="rate('${meal.rk}',${n})">★</span>`).join('')}</div>`:''}
    </div>`).join('');
}

window.rate=function(meal,n){ratings[meal]=n;document.querySelectorAll(`#stars-${meal} .star`).forEach((s,i)=>s.classList.toggle('on',i<n));};

renderMenu();

function showTab(i){
  document.getElementById('sg0').classList.toggle('on',i===0);
  document.getElementById('sg1').classList.toggle('on',i===1);
  document.getElementById('tab-menu').style.display=i===0?'block':'none';
  document.getElementById('tab-tracker').style.display=i===1?'block':'none';
}
</script>
</body>
</html>
