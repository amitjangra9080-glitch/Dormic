<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile — Dormic</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:70px;}
.top-bar{background:#fff;border-bottom:0.5px solid #f0f0f0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;}
.top-name{font-size:16px;font-weight:500;color:#262626;}
.top-ic{font-size:22px;color:#262626;text-decoration:none;}
.main{max-width:500px;margin:0 auto;}
.head-card{background:#fff;padding:20px 16px 14px;}
.head-inner{display:flex;align-items:center;gap:16px;margin-bottom:14px;}
.av{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#6C3BE8,#E8398A,#F97316);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:600;flex-shrink:0;}
.real-name{font-size:15px;font-weight:500;color:#262626;margin-bottom:6px;}
.dline{font-size:12px;color:#8e8e8e;display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.edit-btn{display:flex;align-items:center;justify-content:center;gap:6px;height:34px;border:0.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-weight:500;color:#262626;background:#fff;cursor:pointer;width:100%;}
.divider{height:8px;background:#f7f7f7;}
.sec-lab{font-size:11px;color:#aaa;padding:13px 16px 8px;text-transform:uppercase;letter-spacing:0.3px;background:#fff;}
.post-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:0.5px solid #f7f7f7;background:#fff;cursor:pointer;text-decoration:none;}
.post-ic{width:36px;height:36px;border-radius:10px;background:#f7f7f7;display:flex;align-items:center;justify-content:center;color:#8e8e8e;font-size:17px;flex-shrink:0;}
.post-name{font-size:13px;font-weight:500;color:#262626;line-height:1.2;}
.post-sub{font-size:11px;color:#aaa;}
.badge{margin-left:auto;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.b-lost{background:#fee2e2;color:#a32d2d;}
.b-found{background:#eaf3de;color:#3b6d11;}
.b-have{background:#ede9fe;color:#5b21b6;}
.b-sell{background:#fef3c7;color:#92400e;}
.b-travel{background:#fff3e0;color:#b45309;}
.b-resolved{background:#f3f4f6;color:#6b7280;}
.logout-row{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-top:0.5px solid #f7f7f7;font-size:14px;color:#E8398A;cursor:pointer;}
.empty{text-align:center;padding:32px;color:#aaa;font-size:13px;background:#fff;}
.loading{text-align:center;padding:24px;color:#aaa;font-size:13px;background:#fff;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #f0f0f0;display:flex;align-items:center;justify-content:space-around;height:60px;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#ccc;font-size:22px;}
.nav-item span{font-size:10px;color:#ccc;}
.nav-item.on{color:#6C3BE8;}
.nav-item.on span{color:#6C3BE8;}
.nav-fab{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#6C3BE8,#E8398A);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;text-decoration:none;}
</style>
</head>
<body>
<div class="top-bar">
  <span class="top-name" id="top-uname">Profile</span>
  <a href="#" class="top-ic"><i class="ti ti-settings"></i></a>
</div>

<div class="main">
  <div class="head-card" id="head-card">
    <div style="text-align:center;padding:20px;color:#aaa;">Loading...</div>
  </div>
  <div class="divider"></div>
  <div class="sec-lab">Your posts</div>
  <div id="posts-list" class="loading">Loading...</div>
  <div class="logout-row" onclick="logoutUser()">
    <i class="ti ti-logout"></i> Log out
  </div>
</div>

<nav class="nav-bar">
  <a href="index.html" class="nav-item"><i class="ti ti-home"></i><span>Home</span></a>
  <a href="search.html" class="nav-item"><i class="ti ti-search"></i><span>Search</span></a>
  <a href="post.html" class="nav-fab"><i class="ti ti-plus"></i></a>
  <a href="more.html" class="nav-item"><i class="ti ti-layout-grid"></i><span>More</span></a>
  <a href="profile.html" class="nav-item on"><i class="ti ti-user"></i><span>Profile</span></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async user => {
  if(!user) { window.location.href = 'login.html'; return; }
  const snap = await getDoc(doc(db,'users', user.uid));
  const u = snap.data();
  if(!u) return;

  document.getElementById('top-uname').textContent = u.admissionNo?.toLowerCase().replace(/[^a-z0-9]/g,'_') || 'Profile';

  document.getElementById('head-card').innerHTML = `
    <div class="head-inner">
      <div class="av">${(u.name||'?')[0].toUpperCase()}</div>
      <div>
        <div class="real-name">${u.name}</div>
        <div class="dline"><i class="ti ti-id"></i> ${u.admissionNo} · ${u.degree}</div>
        <div class="dline"><i class="ti ti-microscope"></i> ${u.department}</div>
        <div class="dline"><i class="ti ti-building"></i> ${u.college}</div>
        <div class="dline"><i class="ti ti-door"></i> Room ${u.roomNo} &nbsp;·&nbsp; <i class="ti ti-droplet"></i> ${u.bloodGroup}</div>
      </div>
    </div>
    <div class="edit-btn"><i class="ti ti-pencil"></i> Edit profile</div>
  `;

  // Load user's posts
  const q = query(collection(db,'posts'), where('posterUid','==',user.uid), orderBy('createdAt','desc'));
  onSnapshot(q, snap => {
    const posts = snap.docs.map(d => ({id:d.id,...d.data()}));
    const el = document.getElementById('posts-list');
    if(posts.length === 0) { el.innerHTML = '<div class="empty">No posts yet</div>'; return; }
    const icons = {lost:'ti-search-off',found:'ti-search',have:'ti-package',need:'ti-package-import',sell:'ti-tag',buy:'ti-shopping-cart',travel:'ti-bus'};
    el.innerHTML = posts.map(p => {
      const time = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '';
      const isTravel = p.type === 'travel';
      const name = isTravel ? `${p.from} → ${p.to}` : (p.itemName || 'Post');
      const sub = isTravel ? (p.travelDate||'') : (p.location||'');
      const badgeType = p.status === 'resolved' ? 'resolved' : p.type;
      const badgeLabel = p.status === 'resolved' ? 'Resolved' : (p.type.charAt(0).toUpperCase()+p.type.slice(1));
      return `<a href="index.html" class="post-row">
        <div class="post-ic"><i class="ti ${icons[p.type]||'ti-circle'}"></i></div>
        <div><div class="post-name">${name}</div><div class="post-sub">${sub} · ${time}</div></div>
        <span class="badge b-${badgeType}">${badgeLabel}</span>
      </a>`;
    }).join('');
  });
});

window.logoutUser = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};
</script>
</body>
</html>
