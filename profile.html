<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile — Dormic</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Dormic"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:70px;}
.top-bar{background:#fff;border-bottom:0.5px solid #f0f0f0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;}
.top-name{font-size:16px;font-weight:500;color:#262626;}
.top-ic{font-size:22px;color:#262626;cursor:pointer;background:none;border:none;}
.main{max-width:500px;margin:0 auto;}
.head-card{background:#fff;padding:20px 16px 14px;}
.head-inner{display:flex;align-items:center;gap:16px;margin-bottom:14px;}
.av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:600;flex-shrink:0;}
.real-name{font-size:15px;font-weight:500;color:#262626;margin-bottom:6px;}
.dline{font-size:12px;color:#8e8e8e;display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.edit-btn{display:flex;align-items:center;justify-content:center;gap:6px;height:34px;border:0.5px solid #e0e0e0;border-radius:10px;font-size:13px;font-weight:500;color:#262626;background:#fff;cursor:pointer;width:100%;}
.divider{height:8px;background:#f7f7f7;}
.sec-lab{font-size:11px;color:#aaa;padding:13px 16px 8px;text-transform:uppercase;letter-spacing:0.3px;background:#fff;}
.post-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:0.5px solid #f7f7f7;background:#fff;text-decoration:none;}
.post-ic{width:36px;height:36px;border-radius:10px;background:#f7f7f7;display:flex;align-items:center;justify-content:center;color:#8e8e8e;font-size:17px;flex-shrink:0;}
.post-name{font-size:13px;font-weight:500;color:#262626;line-height:1.2;}
.post-sub{font-size:11px;color:#aaa;}
.badge{margin-left:auto;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.b-lost{background:#fee2e2;color:#a32d2d;}
.b-found{background:#eaf3de;color:#3b6d11;}
.b-have{background:#ede9fe;color:#5b21b6;}
.b-sell{background:#fef3c7;color:#92400e;}
.b-travel{background:#fff3e0;color:#b45309;}
.b-resolved{background:#f3f4f6;color:#6b7280;}
.logout-row{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#fff;border-top:0.5px solid #f7f7f7;font-size:14px;color:#E8398A;cursor:pointer;}
.empty{text-align:center;padding:32px;color:#aaa;font-size:13px;background:#fff;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #f0f0f0;display:flex;align-items:center;justify-content:space-around;height:60px;z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#ccc;font-size:22px;}
.nav-item span{font-size:10px;color:#ccc;}
.nav-item.on{color:#6C3BE8;}
.nav-item.on span{color:#6C3BE8;}
.nav-fab{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#6C3BE8,#E8398A);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;text-decoration:none;}
/* SETTINGS OVERLAY */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:200;}
.overlay.show{display:block;}
.settings-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:20px;z-index:201;max-height:85vh;overflow-y:auto;}
.sheet-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:16px;font-weight:600;color:#262626;margin-bottom:20px;}
.settings-row{display:flex;align-items:center;padding:13px 0;border-bottom:0.5px solid #f7f7f7;gap:12px;}
.settings-row:last-child{border-bottom:none;}
.s-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.s-label{font-size:14px;font-weight:500;color:#262626;}
.s-sub{font-size:12px;color:#aaa;margin-top:1px;}
.s-arr{font-size:17px;color:#ccc;margin-left:auto;}
/* EDIT MODAL */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:300;align-items:flex-end;}
.modal.show{display:flex;}
.modal-card{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;color:#262626;margin-bottom:16px;}
.lab{font-size:11px;color:#8e8e8e;margin:0 0 5px 2px;display:block;}
.inp{width:100%;height:42px;border:0.5px solid #e5e5e5;border-radius:10px;background:#f9f9f9;font-size:14px;color:#262626;padding:0 13px;margin-bottom:12px;outline:none;font-family:inherit;}
.inp:focus{border-color:#6C3BE8;}
.modal-btn{width:100%;height:44px;background:linear-gradient(90deg,#6C3BE8,#E8398A);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;}
.cancel-btn{width:100%;height:40px;background:none;border:0.5px solid #e0e0e0;border-radius:10px;color:#666;font-size:14px;cursor:pointer;margin-top:8px;}
.msg{padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:10px;display:none;}
.msg.error{background:#fee2e2;color:#a32d2d;display:block;}
.msg.success{background:#eaf3de;color:#3b6d11;display:block;}
.avatar-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px;}
.av-opt{width:44px;height:44px;border-radius:50%;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;}
.av-opt.selected{border-color:#6C3BE8;transform:scale(1.1);}
</style>
</head>
<body>
<div class="top-bar">
  <span class="top-name" id="top-uname">Profile</span>
  <button class="top-ic" onclick="openSettings()"><i class="ti ti-settings"></i></button>
</div>

<div class="main" id="main-content">
  <div style="text-align:center;padding:40px;color:#aaa;font-size:14px;">Loading...</div>
</div>

<!-- SETTINGS OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSettings()"></div>
<div class="settings-sheet" id="settings-sheet" style="display:none;">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Settings</div>
  <div class="settings-row" onclick="openEdit('phone')">
    <div class="s-ic" style="background:#ede9fe;color:#5b21b6;"><i class="ti ti-brand-whatsapp"></i></div>
    <div><div class="s-label">Change WhatsApp number</div><div class="s-sub">Update your contact number</div></div>
    <span class="s-arr"><i class="ti ti-chevron-right"></i></span>
  </div>
  <div class="settings-row" onclick="openEdit('room')">
    <div class="s-ic" style="background:#fce7f3;color:#9d174d;"><i class="ti ti-door"></i></div>
    <div><div class="s-label">Change room number</div><div class="s-sub">Update your room</div></div>
    <span class="s-arr"><i class="ti ti-chevron-right"></i></span>
  </div>
  <div class="settings-row" onclick="openEdit('password')">
    <div class="s-ic" style="background:#fff3e0;color:#b45309;"><i class="ti ti-lock"></i></div>
    <div><div class="s-label">Change password</div><div class="s-sub">Update your login password</div></div>
    <span class="s-arr"><i class="ti ti-chevron-right"></i></span>
  </div>
  <div class="settings-row" onclick="openEdit('avatar')">
    <div class="s-ic" style="background:#eaf3de;color:#3b6d11;"><i class="ti ti-user-circle"></i></div>
    <div><div class="s-label">Change avatar</div><div class="s-sub">Pick a new profile avatar</div></div>
    <span class="s-arr"><i class="ti ti-chevron-right"></i></span>
  </div>
  <div class="settings-row" onclick="openEdit('donor')">
    <div class="s-ic" style="background:#fee2e2;color:#a32d2d;"><i class="ti ti-droplet"></i></div>
    <div><div class="s-label">Blood donor status</div><div class="s-sub" id="donor-status-sub">Loading...</div></div>
    <span class="s-arr"><i class="ti ti-chevron-right"></i></span>
  </div>
  <div class="settings-row" style="color:#E8398A;" onclick="logoutUser()">
    <div class="s-ic" style="background:#fce7f3;color:#E8398A;"><i class="ti ti-logout"></i></div>
    <div><div class="s-label" style="color:#E8398A;">Log out</div></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal" id="edit-modal">
  <div class="modal-card">
    <div class="modal-title" id="modal-title">Edit</div>
    <div class="msg" id="modal-msg"></div>
    <div id="modal-body"></div>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
  </div>
</div>

<nav class="nav-bar">
  <a href="index.html" class="nav-item"><i class="ti ti-home"></i><span>Home</span></a>
  <a href="search.html" class="nav-item"><i class="ti ti-search"></i><span>Search</span></a>
  <a href="post.html" class="nav-fab"><i class="ti ti-plus"></i></a>
  <a href="more.html" class="nav-item"><i class="ti ti-layout-grid"></i><span>More</span></a>
  <a href="profile.html" class="nav-item on"><i class="ti ti-user"></i><span>Profile</span></a>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const avatarBgs = ['','linear-gradient(135deg,#6C3BE8,#E8398A)','linear-gradient(135deg,#E8398A,#F97316)','linear-gradient(135deg,#F97316,#FBBF24)','linear-gradient(135deg,#3B82F6,#6C3BE8)','linear-gradient(135deg,#10B981,#3B82F6)','linear-gradient(135deg,#EF4444,#E8398A)','linear-gradient(135deg,#8B5CF6,#EC4899)','linear-gradient(135deg,#06B6D4,#3B82F6)','linear-gradient(135deg,#F59E0B,#EF4444)','linear-gradient(135deg,#10B981,#6C3BE8)','linear-gradient(135deg,#EC4899,#F97316)','linear-gradient(135deg,#6366F1,#8B5CF6)','linear-gradient(135deg,#14B8A6,#10B981)','linear-gradient(135deg,#F97316,#6C3BE8)','linear-gradient(135deg,#EF4444,#F97316)','linear-gradient(135deg,#3B82F6,#10B981)','linear-gradient(135deg,#A855F7,#3B82F6)','linear-gradient(135deg,#F43F5E,#6366F1)','linear-gradient(135deg,#0EA5E9,#6C3BE8)','linear-gradient(135deg,#84CC16,#10B981)'];

let currentUser = null;
let userData = null;

onAuthStateChanged(auth, async user => {
  if(!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  try {
    const snap = await getDoc(doc(db,'users', user.uid));
    if(!snap.exists()) { document.getElementById('main-content').innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;">Profile not found</div>'; return; }
    userData = snap.data();
    renderProfile();
    loadPosts();
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div style="text-align:center;padding:40px;color:#a32d2d;font-size:13px;">Error loading profile: ${e.message}</div>`;
  }
});

function renderProfile() {
  const avBg = avatarBgs[userData.avatarId || 1];
  document.getElementById('top-uname').textContent = userData.admissionNo?.toLowerCase() || 'Profile';
  document.getElementById('donor-status-sub').textContent = userData.isDonor ? 'Currently listed as donor' : 'Not listed as donor';
  document.getElementById('main-content').innerHTML = `
    <div style="background:#fff;padding:20px 16px 14px;">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
        <div class="av" style="background:${avBg}">${(userData.name||'?')[0].toUpperCase()}</div>
        <div>
          <div class="real-name">${userData.name}</div>
          <div class="dline"><i class="ti ti-id"></i> ${userData.admissionNo} · ${userData.degree}</div>
          <div class="dline"><i class="ti ti-microscope"></i> ${userData.department}</div>
          <div class="dline"><i class="ti ti-building"></i> ${userData.college}</div>
          <div class="dline"><i class="ti ti-door"></i> Room ${userData.roomNo} &nbsp;·&nbsp; <i class="ti ti-droplet"></i> ${userData.bloodGroup}</div>
        </div>
      </div>
    </div>
    <div style="height:8px;background:#f7f7f7;"></div>
    <div class="sec-lab">Your posts</div>
    <div id="posts-list"><div class="empty">Loading...</div></div>
  `;
}

function loadPosts() {
  const q = query(collection(db,'posts'), where('posterUid','==',currentUser.uid), orderBy('createdAt','desc'));
  onSnapshot(q, snap => {
    const posts = snap.docs.map(d => ({id:d.id,...d.data()}));
    const el = document.getElementById('posts-list');
    if(!el) return;
    if(posts.length === 0) { el.innerHTML = '<div class="empty">No posts yet</div>'; return; }
    const icons = {lost:'ti-search-off',found:'ti-search',have:'ti-package',need:'ti-package-import',sell:'ti-tag',buy:'ti-shopping-cart',travel:'ti-bus'};
    el.innerHTML = posts.map(p => {
      const time = p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '';
      const isTravel = p.type === 'travel';
      const name = isTravel ? `${p.from||''} → ${p.to||''}` : (p.itemName||'Post');
      const sub = isTravel ? (p.travelDate||'') : (p.location||'');
      const bt = p.status==='resolved' ? 'resolved' : p.type;
      const bl = p.status==='resolved' ? 'Resolved' : (p.type.charAt(0).toUpperCase()+p.type.slice(1));
      return `<div class="post-row">
        <div class="post-ic"><i class="ti ${icons[p.type]||'ti-circle'}"></i></div>
        <div><div class="post-name">${name}</div><div class="post-sub">${sub} · ${time}</div></div>
        <span class="badge b-${bt}">${bl}</span>
      </div>`;
    }).join('') + `<div class="logout-row" onclick="logoutUser()"><i class="ti ti-logout"></i> Log out</div>`;
  });
}

window.openSettings = function() {
  document.getElementById('overlay').classList.add('show');
  document.getElementById('settings-sheet').style.display = 'block';
};

window.closeSettings = function() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('settings-sheet').style.display = 'none';
};

window.openEdit = function(type) {
  closeSettings();
  const modal = document.getElementById('edit-modal');
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  const msg = document.getElementById('modal-msg');
  msg.className = 'msg';

  if(type === 'phone') {
    title.textContent = 'Change WhatsApp number';
    body.innerHTML = `<label class="lab">New WhatsApp number</label><input class="inp" id="new-phone" type="tel" maxlength="10" placeholder="10-digit number"/><button class="modal-btn" onclick="savePhone()">Save</button>`;
  } else if(type === 'room') {
    title.textContent = 'Change room number';
    body.innerHTML = `<label class="lab">New room number</label><input class="inp" id="new-room" type="text" placeholder="e.g. 112"/><button class="modal-btn" onclick="saveRoom()">Save</button>`;
  } else if(type === 'password') {
    title.textContent = 'Change password';
    body.innerHTML = `<label class="lab">Current password</label><input class="inp" id="curr-pass" type="password" placeholder="Current password"/><label class="lab">New password</label><input class="inp" id="new-pass" type="password" placeholder="Min 6 characters"/><label class="lab">Confirm new password</label><input class="inp" id="conf-pass" type="password" placeholder="Re-enter new password"/><button class="modal-btn" onclick="savePassword()">Update password</button>`;
  } else if(type === 'avatar') {
    title.textContent = 'Change avatar';
    const grid = avatarBgs.slice(1).map((bg,i) => `<div class="av-opt ${userData.avatarId===(i+1)?'selected':''}" style="background:${bg}" data-id="${i+1}" onclick="selectAvatar(${i+1},this)">${i+1}</div>`).join('');
    body.innerHTML = `<div class="avatar-grid">${grid}</div><button class="modal-btn" onclick="saveAvatar()">Save avatar</button>`;
  } else if(type === 'donor') {
    title.textContent = 'Blood donor status';
    const isDonor = userData.isDonor;
    body.innerHTML = `<div style="font-size:14px;color:#555;line-height:1.6;margin-bottom:16px;">Your blood group: <strong>${userData.bloodGroup}</strong><br/>${isDonor?'You are currently listed as a willing donor. Other residents can find you in the blood donor search.':'You are not listed as a donor. Enable this to help residents find blood donors in emergencies.'}</div><button class="modal-btn" style="background:${isDonor?'#fee2e2':'linear-gradient(90deg,#6C3BE8,#E8398A)'};color:${isDonor?'#a32d2d':'#fff'}" onclick="saveDonor(${!isDonor})">${isDonor?'Remove me from donor list':'List me as willing donor'}</button>`;
  }
  modal.classList.add('show');
};

window.closeModal = function() {
  document.getElementById('edit-modal').classList.remove('show');
};

window.selectAvatar = function(id, el) {
  document.querySelectorAll('.av-opt').forEach(a => a.classList.remove('selected'));
  el.classList.add('selected');
};

window.savePhone = async function() {
  const phone = document.getElementById('new-phone').value.trim();
  const msg = document.getElementById('modal-msg');
  if(phone.length !== 10 || !/^\d+$/.test(phone)) { msg.className='msg error'; msg.textContent='Enter a valid 10-digit number.'; return; }
  await updateDoc(doc(db,'users',currentUser.uid),{phone});
  userData.phone = phone;
  msg.className='msg success'; msg.textContent='WhatsApp number updated!';
  setTimeout(closeModal, 1500);
};

window.saveRoom = async function() {
  const room = document.getElementById('new-room').value.trim();
  const msg = document.getElementById('modal-msg');
  if(!room) { msg.className='msg error'; msg.textContent='Enter a room number.'; return; }
  await updateDoc(doc(db,'users',currentUser.uid),{roomNo:room});
  userData.roomNo = room;
  msg.className='msg success'; msg.textContent='Room number updated!';
  setTimeout(() => { closeModal(); renderProfile(); loadPosts(); }, 1500);
};

window.savePassword = async function() {
  const curr = document.getElementById('curr-pass').value;
  const newP = document.getElementById('new-pass').value;
  const conf = document.getElementById('conf-pass').value;
  const msg = document.getElementById('modal-msg');
  if(newP.length < 6) { msg.className='msg error'; msg.textContent='New password must be at least 6 characters.'; return; }
  if(newP !== conf) { msg.className='msg error'; msg.textContent='Passwords do not match.'; return; }
  try {
    const cred = EmailAuthProvider.credential(currentUser.email, curr);
    await reauthenticateWithCredential(currentUser, cred);
    await updatePassword(currentUser, newP);
    msg.className='msg success'; msg.textContent='Password updated!';
    setTimeout(closeModal, 1500);
  } catch(e) {
    msg.className='msg error'; msg.textContent='Current password is wrong.';
  }
};

window.saveAvatar = async function() {
  const selected = document.querySelector('.av-opt.selected');
  if(!selected) return;
  const id = parseInt(selected.dataset.id);
  await updateDoc(doc(db,'users',currentUser.uid),{avatarId:id});
  userData.avatarId = id;
  const msg = document.getElementById('modal-msg');
  msg.className='msg success'; msg.textContent='Avatar updated!';
  setTimeout(() => { closeModal(); renderProfile(); loadPosts(); }, 1000);
};

window.saveDonor = async function(state) {
  await updateDoc(doc(db,'users',currentUser.uid),{isDonor:state});
  userData.isDonor = state;
  document.getElementById('donor-status-sub').textContent = state ? 'Currently listed as donor' : 'Not listed as donor';
  closeModal();
};

window.logoutUser = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};
</script>
</body>
</html>
