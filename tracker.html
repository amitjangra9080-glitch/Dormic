<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meal Tracker — Dormic</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Dormic"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f7f7f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px;font-size:16px;}
.top-bar{background:#fff;border-bottom:0.5px solid #f0f0f0;height:54px;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:100;}
.back{font-size:23px;color:#262626;text-decoration:none;}
.top-title{font-size:17px;font-weight:500;color:#262626;}
.main{max-width:500px;margin:0 auto;}
.desc-note{font-size:14px;color:#8e8e8e;text-align:center;padding:13px 16px 10px;background:#fff;border-bottom:0.5px solid #f0f0f0;font-style:italic;}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;background:#fff;}
.cal-month{font-size:16px;font-weight:500;color:#262626;}
.cal-strip{display:flex;gap:6px;padding:4px 12px 12px;overflow-x:auto;background:#fff;border-bottom:0.5px solid #f0f0f0;}
.cal-strip::-webkit-scrollbar{display:none;}
.cday{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;width:30px;cursor:pointer;}
.cday-lbl{font-size:11px;color:#aaa;font-weight:500;}
.cdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:#f7f7f7;color:#ccc;border:0.5px solid #eee;}
.cdot.full{background:#eaf3de;color:#3b6d11;border:none;}
.cdot.part{background:#fce7f3;color:#9d174d;border:none;}
.cdot.miss{background:#fee2e2;color:#a32d2d;border:none;}
.cdot.today-dot{outline:2.5px solid #6C3BE8;outline-offset:1px;}
.cdot.selected-dot{outline:2.5px solid #E8398A;outline-offset:1px;}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px;background:#fff;border-bottom:0.5px solid #f0f0f0;}
.scard{background:#f7f7f7;border-radius:11px;padding:10px 4px;text-align:center;}
.snum{font-size:17px;font-weight:600;}
.slbl{font-size:11px;color:#aaa;margin-top:2px;}
.day-label{font-size:13px;color:#B65CE0;padding:13px 14px 9px;text-transform:uppercase;letter-spacing:0.3px;background:#fff;font-weight:600;}
.tracker-meals{padding:0 0 8px;background:#fff;}
.tmeal{display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:12px;padding:14px;border-bottom:0.5px solid #f7f7f7;}
.tmeal:last-child{border-bottom:none;}
.tmic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;}
.tmeal-name{font-size:15px;font-weight:500;color:#262626;}
.tmeal-time{font-size:13px;color:#aaa;}
.tright{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.tog{display:flex;border:0.5px solid #e0e0e0;border-radius:20px;overflow:hidden;}
.tp,.ta{font-size:13px;padding:7px 14px;cursor:pointer;color:#aaa;background:#fff;}
.tp.on{background:#eaf3de;color:#3b6d11;font-weight:600;}
.ta.on{background:#fee2e2;color:#a32d2d;font-weight:600;}
.grow{display:flex;align-items:center;gap:8px;}
.glbl{font-size:13px;color:#aaa;}
.cbtn{width:26px;height:26px;border-radius:50%;border:0.5px solid #e0e0e0;background:#f7f7f7;display:flex;align-items:center;justify-content:center;font-size:16px;color:#aaa;cursor:pointer;}
.cnum{font-size:14px;font-weight:600;color:#262626;min-width:18px;text-align:center;}
.submit-area{padding:14px;background:#fff;margin-top:8px;}
.submit-btn{width:100%;height:46px;background:linear-gradient(90deg,#F47B33,#EE4654);border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;}
.edit-btn-row{width:100%;height:42px;background:#f7f7f7;border:0.5px solid #e0e0e0;border-radius:11px;color:#B65CE0;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:10px;}
.saved-badge{text-align:center;font-size:13px;color:#3b6d11;padding:10px;background:#eaf3de;border-radius:10px;margin-bottom:10px;display:none;}
.disabled-tog{opacity:0.5;pointer-events:none;}

.cdot.tracker-save-pop{animation:trackerDotPop .55s ease;}
.saved-badge.tracker-fade{display:block!important;animation:trackerFade .5s ease;}
.snum.tracker-count-pop{animation:trackerCount .45s ease;}
@keyframes trackerDotPop{40%{transform:scale(1.28);box-shadow:0 0 0 7px rgba(108,59,232,.12)}}
@keyframes trackerFade{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes trackerCount{50%{transform:scale(1.15)}}
</style>
</head>
<body>
<div class="top-bar">
  <a href="more.html" class="back"><i class="ti ti-arrow-left"></i></a>
  <span class="top-title">Meal Tracker</span>
</div>

<div class="main">
  <div class="desc-note">Breakfast, lunch, dinner — keep count before the mess math gets messy.</div>
  <div class="cal-head">
    <span class="cal-month" id="cal-month"></span>
  </div>
  <div class="cal-strip" id="cal-strip"></div>
  <div class="summary">
    <div class="scard"><div class="snum" style="color:#3b6d11;" id="s-meals">0</div><div class="slbl">Meals</div></div>
    <div class="scard"><div class="snum" style="color:#a32d2d;" id="s-absent">0</div><div class="slbl">Absent</div></div>
    <div class="scard"><div class="snum" style="color:#9d174d;" id="s-guests">0</div><div class="slbl">Guests</div></div>
    <div class="scard"><div class="snum" style="color:#B65CE0;" id="s-month">Jun</div><div class="slbl">Month</div></div>
  </div>
  <div class="day-label" id="day-label">Today</div>
  <div class="tracker-meals">
    <div class="tmeal">
      <span class="tmic" style="background:linear-gradient(135deg,#F59E0B,#EF4444);"><i class="ti ti-coffee"></i></span>
      <div><div class="tmeal-name">Breakfast</div><div class="tmeal-time">8:00 – 9:00 AM</div></div>
      <div class="tright">
        <div class="tog" id="tog-b"><span class="tp" id="bp" onclick="setP('b')">Present</span><span class="ta" id="ba" onclick="setA('b')">Absent</span></div>
        <div class="grow"><span class="glbl">Guest</span><span class="cbtn" onclick="dc('bg')">−</span><span class="cnum" id="bg">0</span><span class="cbtn" onclick="ic('bg')">+</span></div>
      </div>
    </div>
    <div class="tmeal">
      <span class="tmic" style="background:linear-gradient(135deg,#14B8A6,#84CC16);"><i class="ti ti-tools-kitchen-2"></i></span>
      <div><div class="tmeal-name">Lunch</div><div class="tmeal-time">1:00 – 2:00 PM</div></div>
      <div class="tright">
        <div class="tog" id="tog-l"><span class="tp" id="lp" onclick="setP('l')">Present</span><span class="ta" id="la" onclick="setA('l')">Absent</span></div>
        <div class="grow"><span class="glbl">Guest</span><span class="cbtn" onclick="dc('lg')">−</span><span class="cnum" id="lg">0</span><span class="cbtn" onclick="ic('lg')">+</span></div>
      </div>
    </div>
    <div class="tmeal">
      <span class="tmic" style="background:linear-gradient(135deg,#6366F1,#A855F7);"><i class="ti ti-moon"></i></span>
      <div><div class="tmeal-name">Dinner</div><div class="tmeal-time">8:00 – 9:00 PM</div></div>
      <div class="tright">
        <div class="tog" id="tog-d"><span class="tp" id="dp" onclick="setP('d')">Present</span><span class="ta" id="da" onclick="setA('d')">Absent</span></div>
        <div class="grow"><span class="glbl">Guest</span><span class="cbtn" onclick="dc('dg')">−</span><span class="cnum" id="dg">0</span><span class="cbtn" onclick="ic('dg')">+</span></div>
      </div>
    </div>
  </div>
  <div class="submit-area">
    <div class="saved-badge" id="saved-badge">Saved</div>
    <button class="submit-btn" id="submit-btn" onclick="submitTracker()">Save</button>
    <button class="edit-btn-row" id="edit-btn" onclick="editTracker()" style="display:none;">Edit this entry</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const today = new Date();
const todayStr = today.toISOString().split('T')[0];
document.getElementById('cal-month').textContent = today.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
document.getElementById('s-month').textContent = today.toLocaleDateString('en-IN',{month:'short'});

// Rolling 7-day window: past 6 days + today
function get7DayWindow(){
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    days.push(d);
  }
  return days;
}

let currentUser = null;
let isLocked = false;
let selectedDateStr = todayStr;
const counts = {bg:0,lg:0,dg:0};
const state = {b:null,l:null,d:null};

onAuthStateChanged(auth, async user => {
  if(!user){window.location.href='login.html';return;}
  currentUser = user;
  await buildCalendar();
  await loadDayData(todayStr);
  updateDayLabel(todayStr);
  updateSummary();
});

async function buildCalendar(){
  const strip = document.getElementById('cal-strip');
  const window7 = get7DayWindow();
  strip.innerHTML = '';
  const daysInMonth = new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  // Show full month with dots, highlight 7-day window as clickable
  for(let i=1;i<=daysInMonth;i++){
    const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const dateObj = new Date(today.getFullYear(),today.getMonth(),i);
    const isToday = i===today.getDate();
    const isInWindow = window7.some(d=>d.getDate()===i);
    const isFuture = dateObj > today;
    const div = document.createElement('div');
    div.className = 'cday';
    const lbl = document.createElement('span');
    lbl.className = 'cday-lbl';
    lbl.textContent = i;
    const dot = document.createElement('span');
    dot.className = 'cdot' + (isToday?' today-dot':'') + (dateStr===selectedDateStr&&!isToday?' selected-dot':'');
    dot.id = `dot-${dateStr}`;
    if(!isFuture && currentUser){
      try {
        const snap = await getDoc(doc(db,'messTracker',currentUser.uid,'days',dateStr));
        if(snap.exists()){
          const d = snap.data();
          const pc=[d.breakfast,d.lunch,d.dinner].filter(v=>v==='present').length;
          if(pc===3)dot.classList.add('full');
          else if(pc>0)dot.classList.add('part');
          else dot.classList.add('miss');
          dot.textContent = pc;
        }
      }catch(e){}
    }
    if(isInWindow && !isFuture){
      div.style.cursor = 'pointer';
      div.onclick = () => selectDay(dateStr, div);
    } else {
      div.style.opacity = '0.4';
    }
    div.appendChild(lbl);
    div.appendChild(dot);
    strip.appendChild(div);
    // Scroll to today
    if(isToday) setTimeout(()=>div.scrollIntoView({inline:'center',behavior:'smooth'}),300);
  }
}

function selectDay(dateStr, divEl){
  // Remove selected highlight from all
  document.querySelectorAll('.cdot').forEach(d=>{
    d.classList.remove('selected-dot');
    if(d.id===`dot-${todayStr}`) d.classList.add('today-dot');
  });
  const dot = document.getElementById(`dot-${dateStr}`);
  if(dot) dot.classList.add('selected-dot');
  selectedDateStr = dateStr;
  updateDayLabel(dateStr);
  loadDayData(dateStr);
}

function updateDayLabel(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const isToday = dateStr===todayStr;
  const label = isToday
    ? `Today — ${d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'})}`
    : d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'});
  document.getElementById('day-label').textContent = label;
}

async function loadDayData(dateStr){
  // Reset UI
  state.b=null;state.l=null;state.d=null;
  counts.bg=0;counts.lg=0;counts.dg=0;
  updateToggleUI('b',null);updateToggleUI('l',null);updateToggleUI('d',null);
  document.getElementById('bg').textContent=0;
  document.getElementById('lg').textContent=0;
  document.getElementById('dg').textContent=0;
  unlockForm();
  try {
    const snap = await getDoc(doc(db,'messTracker',currentUser.uid,'days',dateStr));
    if(snap.exists()){
      const d = snap.data();
      state.b=d.breakfast||null;state.l=d.lunch||null;state.d=d.dinner||null;
      counts.bg=d.breakfastGuests||0;counts.lg=d.lunchGuests||0;counts.dg=d.dinnerGuests||0;
      updateToggleUI('b',state.b);updateToggleUI('l',state.l);updateToggleUI('d',state.d);
      document.getElementById('bg').textContent=counts.bg;
      document.getElementById('lg').textContent=counts.lg;
      document.getElementById('dg').textContent=counts.dg;
      lockForm();
      updateSummary();
    }
  }catch(e){console.log('No data for',dateStr);}
}

function updateToggleUI(meal,val){
  const p=document.getElementById(meal+'p');
  const a=document.getElementById(meal+'a');
  if(val==='present'){p.className='tp on';a.className='ta';}
  else if(val==='absent'){a.className='ta on';p.className='tp';}
  else{p.className='tp';a.className='ta';}
}

function lockForm(){
  isLocked=true;
  ['b','l','d'].forEach(m=>document.getElementById('tog-'+m).classList.add('disabled-tog'));
  document.querySelectorAll('.cbtn').forEach(b=>b.style.pointerEvents='none');
  document.getElementById('submit-btn').style.display='none';
  document.getElementById('edit-btn').style.display='block';
  const savedBadge=document.getElementById('saved-badge');savedBadge.style.display='block';savedBadge.classList.remove('tracker-fade');void savedBadge.offsetWidth;savedBadge.classList.add('tracker-fade');
}

function unlockForm(){
  isLocked=false;
  ['b','l','d'].forEach(m=>document.getElementById('tog-'+m).classList.remove('disabled-tog'));
  document.querySelectorAll('.cbtn').forEach(b=>b.style.pointerEvents='');
  document.getElementById('submit-btn').style.display='block';
  document.getElementById('edit-btn').style.display='none';
  document.getElementById('saved-badge').style.display='none';
}

window.setP=m=>{if(isLocked)return;state[m]='present';updateToggleUI(m,'present');};
window.setA=m=>{if(isLocked)return;state[m]='absent';updateToggleUI(m,'absent');};
window.ic=id=>{if(isLocked)return;counts[id]++;document.getElementById(id).textContent=counts[id];};
window.dc=id=>{if(isLocked)return;if(counts[id]>0){counts[id]--;document.getElementById(id).textContent=counts[id];}};

window.submitTracker=async function(){
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Saving...';
  try {
    await setDoc(doc(db,'messTracker',currentUser.uid,'days',selectedDateStr),{
      date:selectedDateStr,
      breakfast:state.b||'not set',lunch:state.l||'not set',dinner:state.d||'not set',
      breakfastGuests:counts.bg,lunchGuests:counts.lg,dinnerGuests:counts.dg,
      savedAt:new Date()
    });
    lockForm();await updateSummary();
    // Refresh dot colour
    const dot=document.getElementById(`dot-${selectedDateStr}`);
    if(dot){
      const pc=[state.b,state.l,state.d].filter(v=>v==='present').length;
      dot.className='cdot'+(selectedDateStr===todayStr?' today-dot':' selected-dot');
      if(pc===3)dot.classList.add('full');
      else if(pc>0)dot.classList.add('part');
      else dot.classList.add('miss');
      dot.textContent=pc;
      dot.classList.remove('tracker-save-pop');void dot.offsetWidth;dot.classList.add('tracker-save-pop');setTimeout(()=>dot.classList.remove('tracker-save-pop'),600);
    }
  }catch(e){
    btn.disabled=false;btn.textContent='Save';
    alert('Error: '+e.message);
  }
};

window.editTracker=function(){unlockForm();};

async function updateSummary(){
  // Aggregate across ALL days in current month
  let totalMeals = 0;
  let totalAbsent = 0;
  let totalGuests = 0;
  const daysInMonth = new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  for(let i=1;i<=daysInMonth;i++){
    const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    try {
      const snap = await getDoc(doc(db,'messTracker',currentUser.uid,'days',dateStr));
      if(snap.exists()){
        const d = snap.data();
        totalMeals += [d.breakfast,d.lunch,d.dinner].filter(v=>v==='present').length;
        totalAbsent += [d.breakfast,d.lunch,d.dinner].filter(v=>v==='absent').length;
        totalGuests += (d.breakfastGuests||0)+(d.lunchGuests||0)+(d.dinnerGuests||0);
      }
    }catch(e){}
  }
  document.getElementById('s-meals').textContent=totalMeals;
  document.getElementById('s-absent').textContent=totalAbsent;
  document.getElementById('s-guests').textContent=totalGuests;
  ['s-meals','s-absent','s-guests'].forEach(id=>{const el=document.getElementById(id);el.classList.remove('tracker-count-pop');void el.offsetWidth;el.classList.add('tracker-count-pop');setTimeout(()=>el.classList.remove('tracker-count-pop'),500);});
}
</script>
</body>
</html>
