<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f1e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;font-size:16px;}
.top-bar{background:#1a1a2e;border-bottom:0.5px solid #2a2a42;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;flex-shrink:0;}
.top-title{font-size:18px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;}
.top-title i{font-size:18px;color:#a78bfa;}
.online{font-size:13px;color:#6b7280;display:flex;align-items:center;gap:5px;}
.online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;}
.id-banner{background:#1e1e35;border-bottom:0.5px solid #2a2a42;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.id-label{font-size:11px;color:#6b7280;margin-bottom:2px;}
.id-val{font-size:14px;font-weight:700;color:#a78bfa;}
.desc-bar{background:#12122a;border-bottom:0.5px solid #2a2a42;padding:9px 16px;font-size:12px;color:#6b7280;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0;}
.chat-feed{flex:1;overflow-y:auto;padding:14px 14px 130px;max-width:600px;width:100%;margin:0 auto;}
.chat-feed::-webkit-scrollbar{width:3px;}
.chat-feed::-webkit-scrollbar-thumb{background:#2a2a42;border-radius:3px;}
.day-divider{text-align:center;font-size:11px;color:#374151;margin:12px 0;display:flex;align-items:center;gap:8px;}
.day-divider::before,.day-divider::after{content:'';flex:1;height:0.5px;background:#1f2035;}
.msg-wrap{margin-bottom:10px;}
.bubble{background:#1a1a2e;border-radius:14px;padding:12px 14px;border:0.5px solid #2a2a42;}
.bubble.own{background:#1a1030;border-color:#3d2060;}
.bubble.hidden-msg{opacity:0.5;background:#111827;}
.bhead{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bid{font-size:12px;font-weight:700;color:#a78bfa;letter-spacing:0.2px;}
.bid.own{color:#f472b6;}
.btime{font-size:10px;color:#4b5563;margin-left:auto;}
.btxt{font-size:14px;color:#d1d5db;line-height:1.55;word-break:break-word;}
.btxt.hidden-txt{font-size:13px;color:#6b7280;font-style:italic;}
.bactions{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:8px;border-top:0.5px solid #1f2035;}
.react-btn{font-size:12px;padding:4px 11px;border-radius:20px;border:0.5px solid #2a2a42;background:#0f0f1e;color:#6b7280;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;}
.react-btn.active-up{border-color:#166534;color:#86efac;background:#052e16;}
.react-btn.active-down{border-color:#7f1d1d;color:#fca5a5;background:#1f0d0d;}
.reply-btn{font-size:12px;color:#6b7280;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;padding:0;}
.report-btn{font-size:13px;color:#374151;margin-left:auto;background:none;border:none;cursor:pointer;}
.replies-wrap{margin-top:10px;padding-left:12px;border-left:2px solid #2a2a42;display:flex;flex-direction:column;gap:7px;}
.reply-bubble{background:#0f0f1e;border-radius:10px;padding:9px 11px;}
.reply-bubble.own{background:#140d24;}
.reply-bid{font-size:11px;font-weight:700;color:#818cf8;}
.reply-bid.own{color:#e879f9;}
.reply-time{font-size:10px;color:#374151;margin-left:auto;}
.reply-txt{font-size:13px;color:#9ca3af;line-height:1.45;margin-top:4px;word-break:break-word;}
.reply-actions{display:flex;align-items:center;gap:6px;margin-top:6px;}
.reply-react{font-size:11px;padding:3px 8px;border-radius:20px;border:0.5px solid #2a2a42;background:#141422;color:#6b7280;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:inherit;}
.reply-react.active-up{border-color:#166534;color:#86efac;background:#052e16;}
.reply-react.active-down{border-color:#7f1d1d;color:#fca5a5;background:#1f0d0d;}
.nested-replies{margin-top:7px;padding-left:10px;border-left:2px solid #1f2035;}
.input-bar{position:fixed;bottom:62px;left:0;right:0;background:#1a1a2e;border-top:0.5px solid #2a2a42;padding:11px 14px 12px;z-index:100;}
.reply-ctx{background:#1e1e35;border:0.5px solid #3d2060;border-radius:9px;padding:7px 11px;margin-bottom:9px;font-size:12px;color:#a78bfa;display:none;align-items:center;justify-content:space-between;gap:8px;}
.reply-ctx.show{display:flex;}
.reply-ctx-close{font-size:16px;color:#6b7280;cursor:pointer;background:none;border:none;}
.input-row{display:flex;gap:9px;align-items:center;}
.msg-input{flex:1;background:#0f0f1e;border:0.5px solid #2a2a42;border-radius:22px;padding:10px 16px;font-size:14px;color:#d1d5db;outline:none;font-family:inherit;min-height:42px;max-height:100px;overflow-y:auto;line-height:1.4;}
.msg-input:empty::before{content:attr(data-placeholder);color:#4b5563;}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6C3BE8,#E8398A);border:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{background:#1f2035;color:#374151;cursor:not-allowed;}
.char-count{font-size:11px;color:#374151;text-align:right;margin-top:5px;}
.char-count.warn{color:#b45309;}
.char-count.over{color:#e53935;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:0.5px solid #2a2a42;display:flex;align-items:center;justify-content:space-around;height:62px;z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:#374151;font-size:22px;}
.nav-item span{font-size:11px;color:#374151;}
.nav-item.on{color:#a78bfa;}
.nav-item.on span{color:#a78bfa;}
.nav-fab{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#6C3BE8,#E8398A);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;text-decoration:none;}
.loading{text-align:center;padding:60px 20px;color:#4b5563;font-size:14px;}

@media (max-width: 768px){
  input, textarea, select, [contenteditable="true"]{
    font-size:16px !important;
  }
}

.theme-transition-layer{position:fixed;inset:0;z-index:12000;pointer-events:none;opacity:0;transition:opacity .34s ease;background:#0f0f1e}.theme-transition-layer.light{background:#fff}.theme-transition-layer.active{opacity:1}@media(prefers-reduced-motion:reduce){.theme-transition-layer{transition:none}}

</style>
</head>
<body>

<div class="top-bar">
  <span class="top-title"><i class="ti ti-ghost"></i> Ghost Box</span>
  <span class="online"><span class="online-dot"></span><span id="online-count">4</span> online</span>
</div>

<div class="id-banner">
  <div>
    <div class="id-label">Your anonymous identity</div>
    <div class="id-val" id="my-id-display">Loading...</div>
  </div>
  <i class="ti ti-lock" style="font-size:17px;color:#374151;"></i>
</div>

<div class="desc-bar">
  <i class="ti ti-shield-lock" style="font-size:13px;"></i>
  Your thoughts, your voice — anonymous to everyone in the hostel

<div class="input-bar">
  <div class="reply-ctx" id="reply-ctx">

    <div class="msg-input" id="msg-input" contenteditable="true" data-placeholder="Say something anonymously..." oninput="updateCharCount()"></div>

<script>
(function(){const layer=document.getElementById('theme-transition-layer');const mode=sessionStorage.getItem('dormicThemeTransition');if(mode==='to-dark'){layer.classList.add('active');requestAnimationFrame(()=>requestAnimationFrame(()=>layer.classList.remove('active')));sessionStorage.removeItem('dormicThemeTransition');}
window.DormicNavigate=function(href){layer.classList.add('light','active');sessionStorage.setItem('dormicThemeTransition','from-dark');setTimeout(()=>location.href=href,340);};
document.addEventListener('click',e=>{const a=e.target.closest('a[href]');if(!a||e.defaultPrevented||a.target==='_blank')return;const h=a.getAttribute('href');if(!h||h==='whisper.html'||h.startsWith('#')||h.startsWith('javascript:')||/^https?:/i.test(h))return;e.preventDefault();window.DormicNavigate(a.href);},true);})();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, setDoc, addDoc, updateDoc, onSnapshot, query, orderBy, serverTimestamp, increment, arrayUnion, arrayRemove, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adjectives = ["Silent","Pixel","Neon","Cosmic","Breezy","Velvet","Frosty","Hidden","Zesty","Lucky","Misty","Swift","Chill","Golden","Nova","Urban","Jolly","Sneaky","Calm","Cloudy","Moonlit","Electric","Rapid","Dusty","Echo","Brave","Tiny","Wild","Sleepy","Clever","Happy","Secret","Gentle","Bold","Sunny","Magic","Witty","Shadow","Fuzzy","Lazy"];
const animals = ["Owl","Otter","Badger","Yak","Falcon","Mongoose","Koala","Raven","Panda","Gecko","Tiger","Fox","Husky","Crane","Shark","Turtle","Eagle","Leopard","Frog","Zebra","Dolphin","Hawk","Mole","Hedgehog","Sparrow","Cobra","Rabbit","Penguin","Swan","Bear","Raccoon","Bison","Horse","Cheetah","Wolf","Lynx","Seal","Whale","Parrot","Deer"];

const WORD_LIMIT = 200;
const REPORT_THRESHOLD = 7;
const ONLINE_PADDING = Math.floor(Math.random()*2)+3; // 3 or 4

let currentUser = null;
let myAnonId = null;
let replyTo = null;

onAuthStateChanged(auth, async user => {
  if(!user){ window.location.href='login.html'; return; }
  currentUser = user;
  myAnonId = await getOrCreateAnonId(user.uid);
  document.getElementById('my-id-display').textContent = myAnonId;
  trackPresence(user.uid);
  loadMessages();
});

async function getOrCreateAnonId(uid){
  const ref = doc(db,'anonIds',uid);
  const snap = await getDoc(ref);
  if(snap.exists()) return snap.data().anonId;
  const adj = adjectives[Math.floor(Math.random()*adjectives.length)];
  const animal = animals[Math.floor(Math.random()*animals.length)];
  const num = Math.floor(Math.random()*90)+10; // 10-99
  const id = `${adj}${animal}${num}`;
  await setDoc(ref,{anonId:id,uid,createdAt:new Date()});
  return id;
}

function trackPresence(uid){
  const ref = doc(db,'presence',uid);
  setDoc(ref,{online:true,lastSeen:new Date()});
  onSnapshot(query(collection(db,'presence'),where('online','==',true)), snap => {
    document.getElementById('online-count').textContent = snap.size + ONLINE_PADDING;
  });
  document.addEventListener('visibilitychange',()=>{
    setDoc(ref,{online:document.visibilityState==='visible',lastSeen:new Date()});
  });
  window.addEventListener('beforeunload',()=>{
    setDoc(ref,{online:false,lastSeen:new Date()});
  });
}

function loadMessages(){
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate()-30);
  const q = query(collection(db,'whispers'),orderBy('createdAt','asc'));
  onSnapshot(q, snap => {
    const all = snap.docs.map(d=>({id:d.id,...d.data()}));
    const top = all.filter(m=>!m.parentId && m.createdAt?.seconds > cutoff.getTime()/1000);
    renderMessages(top, all);
  });
}

function renderMessages(msgs, all){
  const feed = document.getElementById('chat-feed');
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 100;
  if(!msgs.length){
    feed.innerHTML='<div class="loading">No messages yet. Say something 👻</div>';
    return;
  }
  let html='';
  let lastDate='';
  msgs.forEach(msg=>{
    const dateStr = msg.createdAt ? new Date(msg.createdAt.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '';
    if(dateStr!==lastDate){ html+=`<div class="day-divider">${dateStr}</div>`; lastDate=dateStr; }
    html += buildBubble(msg, all, false);
  });
  feed.innerHTML = html;
  if(atBottom) feed.scrollTop = feed.scrollHeight;
}

function buildBubble(msg, all, isNested){
  const isOwn = msg.anonId === myAnonId;
  const isHidden = (msg.reports||0) >= REPORT_THRESHOLD;
  const time = msg.createdAt ? new Date(msg.createdAt.seconds*1000).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false}) : '';
  const upCount = msg.upvotes||0;
  const downCount = msg.downvotes||0;
  const myUp = (msg.upvoters||[]).includes(currentUser?.uid);
  const myDown = (msg.downvoters||[]).includes(currentUser?.uid);
  const replies = all.filter(d=>d.parentId===msg.id);
  const repliesHTML = replies.map(r=>buildBubble(r,all,true)).join('');
  const reportBtn = !isOwn ? `<button class="report-btn" onclick="reportMsg('${msg.id}')"><i class="ti ti-flag"></i></button>` : '';
  const replyBtnHTML = `<button class="${isNested?'reply-react':'reply-btn'}" onclick="setReply('${msg.id}','${esc(msg.anonId)}','${esc((msg.text||'').substring(0,40))}','${msg.parentId||msg.id}')"><i class="ti ti-corner-down-right"></i> Reply</button>`;

  if(isNested){
    return `<div class="reply-bubble ${isOwn?'own':''}">
      <div class="bhead">
        <span class="reply-bid ${isOwn?'own':''}">${msg.anonId}</span>
        <span class="reply-time">${time}</span>
      </div>
      ${isHidden
        ? `<div class="reply-txt" style="color:#6b7280;font-style:italic;">Hidden after reports.</div>`
        : `<div class="reply-txt">${escHtml(msg.text||'')}</div>`}
      <div class="reply-actions">
        <button class="reply-react ${myUp?'active-up':''}" onclick="react('${msg.id}','up')"><i class="ti ti-arrow-up"></i> ${upCount}</button>
        <button class="reply-react ${myDown?'active-down':''}" onclick="react('${msg.id}','down')"><i class="ti ti-arrow-down"></i> ${downCount}</button>
        ${replyBtnHTML}
        ${reportBtn}
      </div>
      ${replies.length?`<div class="nested-replies">${repliesHTML}</div>`:''}
    </div>`;
  }

  return `<div class="msg-wrap" id="msg-${msg.id}">
    <div class="bubble ${isOwn?'own':''} ${isHidden?'hidden-msg':''}">
      <div class="bhead">
        <span class="bid ${isOwn?'own':''}">${msg.anonId}</span>
        <span class="btime">${time}</span>
      </div>
      ${isHidden
        ? `<div class="btxt hidden-txt">This message was hidden after multiple reports.</div>`
        : `<div class="btxt">${escHtml(msg.text||'')}</div>`}
      <div class="bactions">
        <button class="react-btn ${myUp?'active-up':''}" onclick="react('${msg.id}','up')"><i class="ti ti-arrow-up"></i> ${upCount}</button>
        <button class="react-btn ${myDown?'active-down':''}" onclick="react('${msg.id}','down')"><i class="ti ti-arrow-down"></i> ${downCount}</button>
        ${replyBtnHTML}
        ${reportBtn}
      </div>
      ${replies.length?`<div class="replies-wrap">${repliesHTML}</div>`:''}
    </div>
  </div>`;
}

window.sendMessage = async function(){
  const input = document.getElementById('msg-input');
  const text = input.innerText.trim();
  if(!text) return;
  const words = text.split(/\s+/).filter(Boolean).length;
  if(words > WORD_LIMIT){ alert(`Max ${WORD_LIMIT} words allowed.`); return; }
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  try {
    await addDoc(collection(db,'whispers'),{
      text,
      anonId: myAnonId,
      uid: currentUser.uid,
      parentId: replyTo ? (replyTo.parentId || replyTo.msgId) : null,
      replyToId: replyTo?.msgId || null,
      replyToAnonId: replyTo?.anonId || null,
      upvotes:0, downvotes:0,
      upvoters:[], downvoters:[],
      reports:0, reportedBy:[],
      createdAt: serverTimestamp()
    });
    input.innerText = '';
    updateCharCount();
    cancelReply();
    setTimeout(()=>{ document.getElementById('chat-feed').scrollTop = document.getElementById('chat-feed').scrollHeight; }, 300);
  } catch(e){ alert('Error: '+e.message); }
  btn.disabled = false;
};

window.setReply = function(msgId, anonId, preview, parentId){
  replyTo = {msgId, anonId, preview, parentId};
  document.getElementById('reply-ctx-txt').textContent = `Replying to ${anonId}: "${preview}${preview.length>=40?'...':''}"`;
  document.getElementById('reply-ctx').classList.add('show');
  document.getElementById('msg-input').focus();
};

window.cancelReply = function(){
  replyTo = null;
  document.getElementById('reply-ctx').classList.remove('show');
};

window.react = async function(msgId, type){
  const ref = doc(db,'whispers',msgId);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;
  const d = snap.data();
  const uid = currentUser.uid;
  const upvoters = d.upvoters||[];
  const downvoters = d.downvoters||[];
  if(type==='up'){
    if(upvoters.includes(uid)){
      await updateDoc(ref,{upvotes:increment(-1),upvoters:arrayRemove(uid)});
    } else {
      const u={upvotes:increment(1),upvoters:arrayUnion(uid)};
      if(downvoters.includes(uid)){u.downvotes=increment(-1);u.downvoters=arrayRemove(uid);}
      await updateDoc(ref,u);
    }
  } else {
    if(downvoters.includes(uid)){
      await updateDoc(ref,{downvotes:increment(-1),downvoters:arrayRemove(uid)});
    } else {
      const u={downvotes:increment(1),downvoters:arrayUnion(uid)};
      if(upvoters.includes(uid)){u.upvotes=increment(-1);u.upvoters=arrayRemove(uid);}
      await updateDoc(ref,u);
    }
  }
};

window.reportMsg = async function(msgId){
  if(!confirm('Report this message?')) return;
  const ref = doc(db,'whispers',msgId);
  const snap = await getDoc(ref);
  if(!snap.exists()) return;
  if((snap.data().reportedBy||[]).includes(currentUser.uid)){
    alert('You already reported this message.');
    return;
  }
  await updateDoc(ref,{reports:increment(1),reportedBy:arrayUnion(currentUser.uid)});
  alert('Reported. Thank you.');
};

window.updateCharCount = function(){
  const text = document.getElementById('msg-input').innerText.trim();
  const words = text ? text.split(/\s+/).filter(Boolean).length : 0;
  const el = document.getElementById('char-count');
  el.textContent = `${words} / ${WORD_LIMIT} words`;
  el.className = 'char-count' + (words > WORD_LIMIT*0.85 ? (words > WORD_LIMIT ? ' over' : ' warn') : '');
};

document.getElementById('msg-input').addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});

function escHtml(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc(t){ return (t||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/\n/g,' '); }
</script>
